spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cookieshop?characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password:
  application:
    name: CakeShop
  thymeleaf:
    cache: false
  mvc:
    hidden method:
      filter:
        enabled: true
    static-path-pattern: /**
  resources:
    static-locations: classpath:/static/
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full

logging:
  level:
    '[com.fr.mapper]': debug  #日志等级
server:
  port: 8090

