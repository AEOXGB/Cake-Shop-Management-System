<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>蛋糕系统 - 注册</title>
    <link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
    <link type="text/css" rel="stylesheet" th:href="@{/css/main.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/zui.min.css}">
    <script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
    <script type="text/javascript" th:src="@{/js/zui.min.js}"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        
        :root {
            --gold: #C9A96E;
            --gold-light: #E3C98B;
            --gold-dark: #A68B5C;
            --cream: #F5E6D3;
            --dark: #1a1410;
            --dark-brown: #2d1810;
            --mid-brown: #4a2a1a;
            --text-light: rgba(245, 230, 211, 0.8);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(160deg, #1a1410 0%, #2d1810 40%, #1a1410 100%);
            position: relative;
        }
        
        /* ===== 暖光背景 ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(201, 169, 110, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(201, 169, 110, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* ===== 背景装饰纹理 ===== */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201, 169, 110, 0.02) 40px, rgba(201, 169, 110, 0.02) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201, 169, 110, 0.02) 40px, rgba(201, 169, 110, 0.02) 41px);
            pointer-events: none;
            z-index: 0;
        }
        
        /* ===== 导航栏 ===== */
        .navbar-cake {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-brown) 100%) !important;
            border: none !important;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            padding: 8px 0;
            position: relative;
            z-index: 10;
            border-bottom: 1px solid rgba(201, 169, 110, 0.1);
        }
        .navbar-cake .navbar-brand {
            color: var(--gold) !important;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .navbar-cake .navbar-nav > li > a {
            color: var(--text-light) !important;
            font-size: 15px;
            transition: all 0.3s;
            position: relative;
        }
        .navbar-cake .navbar-nav > li > a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: all 0.3s;
            transform: translateX(-50%);
        }
        .navbar-cake .navbar-nav > li > a:hover::after,
        .navbar-cake .navbar-nav > li.active > a::after {
            width: 60%;
        }
        .navbar-cake .navbar-nav > li > a:hover,
        .navbar-cake .navbar-nav > li.active > a {
            color: var(--gold) !important;
        }
        
        /* ===== 主容器 ===== */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* ===== 注册卡片 ===== */
        .register-card {
            background: rgba(26, 20, 16, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(201, 169, 110, 0.15);
            width: 100%;
            max-width: 480px;
            padding: 50px 40px 40px;
            border: 1px solid rgba(201, 169, 110, 0.12);
            position: relative;
            overflow: hidden;
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* 顶部装饰条 */
        .register-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }
        
        /* 角落星标 */
        .register-card::after {
            content: '✦';
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 14px;
            color: var(--gold);
            opacity: 0.3;
        }
        
        .register-logo { text-align: center; margin-bottom: 30px; }
        .register-logo .brand-icon {
            font-size: 44px;
            display: block;
            margin-bottom: 6px;
            animation: gentleBounce 3s ease-in-out infinite;
        }
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .register-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .register-logo p {
            color: rgba(245, 230, 211, 0.5);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 3px;
            font-weight: 300;
        }
        
        /* ===== 表单 ===== */
        .input-group { margin-bottom: 16px; width: 100%; }
        .input-group-addon {
            width: 50px;
            background: rgba(26, 20, 16, 0.6);
            border: 1px solid rgba(201, 169, 110, 0.15);
            border-right: none;
            text-align: center;
            color: var(--gold);
            border-radius: 14px 0 0 14px;
            transition: all 0.3s;
        }
        .form-control {
            height: 50px;
            border: 1px solid rgba(201, 169, 110, 0.15);
            border-left: none;
            font-size: 15px;
            padding: 10px 16px;
            border-radius: 0 14px 14px 0;
            font-family: inherit;
            background: rgba(26, 20, 16, 0.6);
            color: var(--cream);
            transition: all 0.3s;
        }
        .form-control::placeholder {
            color: rgba(245, 230, 211, 0.3);
            font-weight: 300;
        }
        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
            background: rgba(26, 20, 16, 0.8);
        }
        .input-group:focus-within .input-group-addon {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.08);
        }
        
        /* ===== 用户类型选择器 ===== */
        .user-type-selector {
            margin-bottom: 16px;
            background: rgba(26, 20, 16, 0.6);
            border: 1px solid rgba(201, 169, 110, 0.15);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-type-selector .type-icon {
            color: var(--gold);
            font-size: 16px;
            flex-shrink: 0;
        }
        .user-type-selector label {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 8px;
            color: rgba(245, 230, 211, 0.7);
            font-size: 14px;
            transition: color 0.3s;
            padding: 6px 14px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .user-type-selector label:hover {
            color: var(--cream);
            background: rgba(201, 169, 110, 0.08);
        }
        .user-type-selector input[type="radio"] {
            accent-color: var(--gold);
        }
        
        .login-link {
            text-align: right;
            margin-bottom: 20px;
        }
        .login-link a {
            color: rgba(201, 169, 110, 0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .login-link a:hover { color: var(--gold); }
        .login-link a::after {
            content: '→';
            margin-left: 4px;
            transition: margin 0.3s;
        }
        .login-link a:hover::after { margin-left: 8px; }
        
        .btn-register {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 14px;
            color: var(--dark);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            letter-spacing: 3px;
            box-shadow: 0 4px 25px rgba(201, 169, 110, 0.25);
            position: relative;
            overflow: hidden;
        }
        .btn-register::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s;
        }
        .btn-register:hover::before { left: 100%; }
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(201, 169, 110, 0.4);
        }
        .btn-register:active { transform: translateY(0); }
        
        /* ===== 页脚 ===== */
        .footer {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-brown) 100%);
            padding: 20px 40px;
            text-align: center;
            color: rgba(245, 230, 211, 0.3);
            border-top: 1px solid rgba(201, 169, 110, 0.06);
            position: relative;
            z-index: 10;
            font-size: 12px;
        }
        .footer p { margin: 2px 0; }
        
        @media (max-width: 480px) {
            .register-card { padding: 35px 24px 30px; }
            .form-control { height: 46px; font-size: 14px; }
            .btn-register { height: 46px; font-size: 15px; }
            .register-logo h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <nav class="navbar navbar-cake">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse-example">
                    <span class="sr-only">切换导航</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" th:href="@{/login.html}">✦ CakeShop</a>
            </div>
            <div class="collapse navbar-collapse navbar-collapse-example">
                <ul class="nav navbar-nav">
                    <li class="active"><a th:href="@{/register.html}">注册</a></li>
                    <li><a th:href="@{/login.html}">登录</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right" style="padding-right:60px;">
                    <li><a href="#"><i class="icon icon-shopping-cart icon-2x"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="main-wrapper">
        <div class="register-card">
            <div class="register-logo">
                <span class="brand-icon">🎂</span>
                <h1>加入我们</h1>
                <p>创建账户 · 开启蛋糕之旅</p>
            </div>
            
            <form th:action="@{/user/register}" method="post">
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-user"></i></span>
                    <input type="text" class="form-control" placeholder="请输入用户名" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-lock"></i></span>
                    <input type="password" class="form-control" placeholder="请输入密码" id="passwd" name="passwd" required>
                </div>
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="请输入邮箱" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-user"></i></span>
                    <input type="text" class="form-control" placeholder="请输入收货人姓名" id="receiveName" name="receiveName" required>
                </div>
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-phone"></i></span>
                    <input type="tel" class="form-control" placeholder="请输入11位手机号" id="receivePhone" name="receivePhone" required maxlength="11" pattern="^1[3-9]\d{9}$">
                </div>
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-map-marker"></i></span>
                    <input type="text" class="form-control" placeholder="请输入收货地址" id="receiveAddress" name="receiveAddress" required>
                </div>
                
                <!-- 用户类型选择 -->
                <div class="user-type-selector">
                    <span class="type-icon"><i class="icon icon-user"></i></span>
                    <label>
                        <input type="radio" name="userType" value="user" checked>
                        <span>普通用户</span>
                    </label>
                    <label>
                        <input type="radio" name="userType" value="rider">
                        <span>骑手</span>
                    </label>
                </div>
                
                <div class="login-link">
                    <a th:href="@{/login.html}">已有账号？去登录</a>
                </div>
                
                <button class="btn-register" type="submit">注 册</button>
            </form>
        </div>
    </div>
    
    <div class="footer">
        <p>CakeShop · 用心做好每一块蛋糕</p>
        <p>&copy; 2026 CakeShop. All rights reserved.</p>
    </div>
</body>
</html>
