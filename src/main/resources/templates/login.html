<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>蛋糕系统 - 登录</title>
    <link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
    <link type="text/css" rel="stylesheet" th:href="@{/css/main.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/zui.min.css}">
    <script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
    <script type="text/javascript" th:src="@{/js/zui.min.js}"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        
        /* ===== CSS 变量 ===== */
        :root {
            --gold: #C9A96E;
            --gold-light: #E3C98B;
            --gold-dark: #A68B5C;
            --cream: #F5E6D3;
            --dark: #1a1410;
            --dark-brown: #2d1810;
            --mid-brown: #4a2a1a;
            --text-light: rgba(245, 230, 211, 0.8);
            --shadow-sm: 0 4px 25px rgba(45, 24, 16, 0.3);
            --shadow-lg: 0 20px 60px rgba(45, 24, 16, 0.2);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--dark);
            position: relative;
        }
        
        /* ===== 背景装饰 ===== */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(201, 169, 110, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 169, 110, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(74, 42, 26, 0.4) 0%, transparent 50%);
            z-index: 0;
            animation: bgShift 20s ease-in-out infinite alternate;
        }
        
        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, -5%) rotate(3deg); }
        }
        
        /* ===== 装饰粒子（纯CSS） ===== */
        .deco-dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .deco-dot:nth-child(1) {
            top: 15%; left: 10%;
            width: 6px; height: 6px;
            background: var(--gold);
            opacity: 0.3;
            animation: floatDot 8s ease-in-out infinite;
        }
        .deco-dot:nth-child(2) {
            top: 70%; left: 85%;
            width: 10px; height: 10px;
            background: var(--gold-light);
            opacity: 0.2;
            animation: floatDot 12s ease-in-out infinite reverse;
        }
        .deco-dot:nth-child(3) {
            top: 30%; left: 92%;
            width: 4px; height: 4px;
            background: var(--cream);
            opacity: 0.25;
            animation: floatDot 6s ease-in-out infinite 2s;
        }
        .deco-dot:nth-child(4) {
            top: 80%; left: 8%;
            width: 8px; height: 8px;
            background: var(--gold-dark);
            opacity: 0.2;
            animation: floatDot 10s ease-in-out infinite 1s;
        }
        
        @keyframes floatDot {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.3); }
        }
        
        /* ===== 导航栏 ===== */
        .navbar-cake {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-brown) 100%) !important;
            border: none !important;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            padding: 8px 0;
            position: relative;
            z-index: 10;
            border-bottom: 1px solid rgba(201, 169, 110, 0.1);
        }
        .navbar-cake .navbar-brand {
            color: var(--gold) !important;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .navbar-cake .navbar-nav > li > a {
            color: var(--text-light) !important;
            font-size: 15px;
            transition: all 0.3s;
            position: relative;
        }
        .navbar-cake .navbar-nav > li > a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: all 0.3s;
            transform: translateX(-50%);
        }
        .navbar-cake .navbar-nav > li > a:hover::after,
        .navbar-cake .navbar-nav > li.active > a::after {
            width: 60%;
        }
        .navbar-cake .navbar-nav > li > a:hover,
        .navbar-cake .navbar-nav > li.active > a {
            color: var(--gold) !important;
        }
        
        /* ===== 主容器 ===== */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* ===== 登录卡片 ===== */
        .login-card {
            background: rgba(26, 20, 16, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(201, 169, 110, 0.15);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px 45px;
            border: 1px solid rgba(201, 169, 110, 0.12);
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        /* 卡片顶部金色装饰条 */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }
        
        /* 卡片角落装饰 */
        .login-card::after {
            content: '✦';
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 14px;
            color: var(--gold);
            opacity: 0.3;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .login-logo .brand-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            animation: gentleBounce 3s ease-in-out infinite;
        }
        
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        
        .login-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        
        .login-logo p {
            color: rgba(245, 230, 211, 0.5);
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 4px;
            font-weight: 300;
        }
        
        /* ===== 输入框 ===== */
        .input-group {
            margin-bottom: 20px;
            width: 100%;
            position: relative;
        }
        
        .input-group-addon {
            width: 50px;
            background: rgba(26, 20, 16, 0.6);
            border: 1px solid rgba(201, 169, 110, 0.15);
            border-right: none;
            text-align: center;
            color: var(--gold);
            font-size: 14px;
            border-radius: 14px 0 0 14px;
            transition: all 0.3s;
        }
        
        .form-control {
            height: 54px;
            border: 1px solid rgba(201, 169, 110, 0.15);
            border-left: none;
            font-size: 15px;
            padding: 10px 18px;
            border-radius: 0 14px 14px 0;
            font-family: inherit;
            background: rgba(26, 20, 16, 0.6);
            color: var(--cream);
            transition: all 0.3s;
        }
        
        .form-control::placeholder {
            color: rgba(245, 230, 211, 0.3);
            font-weight: 300;
        }
        
        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
            background: rgba(26, 20, 16, 0.8);
        }
        
        .input-group:focus-within .input-group-addon {
            border-color: var(--gold);
            background: rgba(201, 169, 110, 0.08);
        }
        
        .input-group:focus-within {
            transform: translateY(-1px);
        }
        
        /* ===== 注册链接 ===== */
        .register-link {
            text-align: right;
            margin-bottom: 26px;
        }
        
        .register-link a {
            color: rgba(201, 169, 110, 0.7);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }
        
        .register-link a:hover {
            color: var(--gold);
        }
        
        .register-link a::after {
            content: '→';
            margin-left: 4px;
            transition: margin 0.3s;
        }
        
        .register-link a:hover::after {
            margin-left: 8px;
        }
        
        /* ===== 登录按钮 ===== */
        .btn-login {
            width: 100%;
            height: 54px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 14px;
            color: var(--dark);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            letter-spacing: 3px;
            box-shadow: 0 4px 25px rgba(201, 169, 110, 0.25);
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s;
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(201, 169, 110, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        /* ===== 消息提示 ===== */
        .msg-area {
            margin-top: 16px;
        }
        
        /* ===== 页脚精简 ===== */
        .footer {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-brown) 100%);
            padding: 20px 40px;
            text-align: center;
            color: rgba(245, 230, 211, 0.3);
            border-top: 1px solid rgba(201, 169, 110, 0.06);
            position: relative;
            z-index: 10;
            font-size: 12px;
        }
        .footer p { margin: 2px 0; }
        
        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .login-card { padding: 35px 24px 30px; }
            .form-control { height: 48px; font-size: 14px; }
            .btn-login { height: 48px; font-size: 15px; }
            .login-logo h1 { font-size: 28px; }
            .navbar-cake .navbar-brand { font-size: 20px; }
        }
    </style>
</head>
<body>
    <!-- 装饰点 -->
    <div class="deco-dot"></div>
    <div class="deco-dot"></div>
    <div class="deco-dot"></div>
    <div class="deco-dot"></div>
    
    <nav class="navbar navbar-cake">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse-example">
                    <span class="sr-only">切换导航</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" th:href="@{/user/login}">✦ CakeShop</a>
            </div>
            <div class="collapse navbar-collapse navbar-collapse-example">
                <ul class="nav navbar-nav">
                    <li><a th:href="@{/register.html}">注册</a></li>
                    <li class="active"><a th:href="@{/user/login}">登录</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right" style="padding-right:60px;">
                    <li><a href="#"><i class="icon icon-shopping-cart icon-2x"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="main-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <span class="brand-icon">🎂</span>
                <h1>CakeShop</h1>
                <p>欢迎回来 · 请登录您的账户</p>
            </div>
            
            <form th:action="@{/user/login}" method="post">
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-user"></i></span>
                    <input type="text" class="form-control" placeholder="用户名" id="username" name="username" required>
                </div>
                
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-lock"></i></span>
                    <input type="password" class="form-control" placeholder="密码" id="passwd" name="passwd" required>
                </div>
                
                <div class="register-link">
                    <a th:href="@{/register.html}">还没账号？立即注册</a>
                </div>
                
                <button class="btn-login" type="submit" id="login">登 录</button>
            </form>
        </div>
    </div>
    
    <div class="footer">
        <p>CakeShop · 用心做好每一块蛋糕</p>
        <p>&copy; 2026 CakeShop. All rights reserved.</p>
    </div>
    
    <div th:if="${not #strings.isEmpty(msg)}" class="msg-area">
        <script>$(function(){ new $.zui.Messager('[[${msg}]]', {icon:'bell-alt',type:'warning',placement:'center'}).show(); });</script>
    </div>
    <div th:if="${not #strings.isEmpty(msg2)}" class="msg-area">
        <script>$(function(){ new $.zui.Messager('[[${msg2}]]', {icon:'bell-alt',type:'success',placement:'center'}).show(); });</script>
    </div>
</body>
</html>
