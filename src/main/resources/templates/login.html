<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>蛋糕系统 - 登录</title>
    <link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
    <link type="text/css" rel="stylesheet" th:href="@{/css/main.css}">
    <link type="text/css" rel="stylesheet" th:href="@{/css/zui.min.css}">
    <script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
    <script type="text/javascript" th:src="@{/js/zui.min.js}"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f8f4f0 0%, #f0ebe5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 导航栏 */
        .navbar-cake {
            background: linear-gradient(135deg, #2d1810 0%, #4a2a1a 100%) !important;
            border: none !important;
            box-shadow: 0 4px 25px rgba(45, 24, 16, 0.3);
            padding: 8px 0;
        }
        .navbar-cake .navbar-brand {
            color: #C9A96E !important;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
        }
        .navbar-cake .navbar-nav > li > a {
            color: rgba(245, 230, 211, 0.8) !important;
            font-size: 15px;
            transition: all 0.3s;
        }
        .navbar-cake .navbar-nav > li > a:hover,
        .navbar-cake .navbar-nav > li.active > a {
            color: #C9A96E !important;
        }
        
        /* 主容器 */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        /* 登录卡片 */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(45, 24, 16, 0.15);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #C9A96E, #A68B5C, #C9A96E);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .login-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #2d1810, #4a2a1a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-logo p {
            color: #8a6d5b;
            font-size: 14px;
            margin-top: 6px;
        }
        
        /* 输入框 */
        .input-group {
            margin-bottom: 20px;
            width: 100%;
        }
        
        .input-group-addon {
            width: 50px;
            background: #faf6f2;
            border: 1px solid rgba(0,0,0,0.08);
            border-right: none;
            text-align: center;
            color: #C9A96E;
            font-size: 14px;
            border-radius: 12px 0 0 12px;
        }
        
        .form-control {
            height: 52px;
            border: 1px solid rgba(0,0,0,0.08);
            border-left: none;
            font-size: 15px;
            padding: 10px 15px;
            border-radius: 0 12px 12px 0;
            font-family: inherit;
        }
        
        .form-control:focus {
            border-color: #C9A96E;
            box-shadow: none;
        }
        
        .input-group:focus-within .input-group-addon {
            border-color: #C9A96E;
        }
        
        .register-link {
            text-align: right;
            margin-bottom: 24px;
        }
        
        .register-link a {
            color: #C9A96E;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .register-link a:hover {
            color: #A68B5C;
        }
        
        /* 登录按钮 */
        .btn-login {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #C9A96E, #A68B5C);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(201, 169, 110, 0.3);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        /* 页脚 */
        .footer {
            background: linear-gradient(135deg, #1a1410, #2d1810);
            padding: 30px 40px;
            text-align: center;
            color: rgba(245, 230, 211, 0.6);
            border-top: 1px solid rgba(201, 169, 110, 0.1);
        }
        
        .footer-links { margin-bottom: 15px; }
        .footer-links a {
            color: rgba(245, 230, 211, 0.5);
            text-decoration: none;
            margin: 0 10px;
            font-size: 13px;
            transition: color 0.3s;
        }
        .footer-links a:hover { color: #C9A96E; }
        .footer-info { font-size: 12px; line-height: 1.8; }
        .footer-info p { margin: 3px 0; }
        
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            .form-control { height: 46px; }
            .btn-login { height: 46px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-cake">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse-example">
                    <span class="sr-only">切换导航</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" th:href="@{/user/login}">🍰 蛋糕系统</a>
            </div>
            <div class="collapse navbar-collapse navbar-collapse-example">
                <ul class="nav navbar-nav">
                    <li><a th:href="@{/register}">注册</a></li>
                    <li class="active"><a th:href="@{/user/login}">登录</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right" style="padding-right:60px;">
                    <li><a href="#"><i class="icon icon-shopping-cart icon-2x"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="main-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <h1>🎂 蛋糕系统</h1>
                <p>欢迎回来，请登录您的账户</p>
            </div>
            
            <form th:action="@{/user/login}" method="post">
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-user"></i></span>
                    <input type="text" class="form-control" placeholder="请输入用户名" id="username" name="username" required>
                </div>
                
                <div class="input-group">
                    <span class="input-group-addon"><i class="icon icon-lock"></i></span>
                    <input type="password" class="form-control" placeholder="请输入密码" id="passwd" name="passwd" required>
                </div>
                
                <div class="register-link">
                    <a th:href="@{/register}">还没账号？请先注册 →</a>
                </div>
                
                <button class="btn-login" type="submit" id="login">登 录</button>
            </form>
        </div>
    </div>
    
    <div class="footer">
        <div class="footer-links">
            <a href="#">百度外卖</a> <a href="#">美团外卖</a> <a href="#">饿了么</a>
            <a href="#">百度</a> <a href="#">谷歌</a> <a href="#">新浪</a>
            <a href="#">网易</a> <a href="#">搜狐</a>
        </div>
        <div class="footer-info">
            <p>24小时客户服务热线：010-68988888 | <a href="#">常见问题解答</a> | 投诉热线：010-627488888</p>
            <p>Copyright &copy; 1999-2026 News China gov, All Right Reserver</p>
            <p>网龙网络有限公司 版权所有</p>
        </div>
    </div>
    
    <div th:if="${not #strings.isEmpty(msg)}">
        <script>$(function(){ new $.zui.Messager('[[${msg}]]', {icon:'bell-alt',type:'warning',placement:'center'}).show(); });</script>
    </div>
    <div th:if="${not #strings.isEmpty(msg2)}">
        <script>$(function(){ new $.zui.Messager('[[${msg2}]]', {icon:'bell-alt',type:'success',placement:'center'}).show(); });</script>
    </div>
</body>
</html>
