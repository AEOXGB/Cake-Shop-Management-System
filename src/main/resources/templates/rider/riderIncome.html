<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收入明细 - 骑手端</title>
    <link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS 变量 ===== */
        :root {
            --primary-start: #667eea;
            --primary-mid: #6c6ce0;
            --primary-end: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-gradient-hover: linear-gradient(135deg, #5a6fd9 0%, #6a4193 100%);
            --accent-gold: #f59e0b;
            --accent-green: #10b981;
            --bg-page: #f0f2f8;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(102, 126, 234, 0.12);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --card-shadow-hover: 0 8px 30px rgba(102, 126, 234, 0.18);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-primary: 'DM Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
            --nav-height: 70px;
        }

        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-primary);
            background: var(--bg-page);
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + 20px);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 页头 - 光晕效果 ===== */
        header {
            background: var(--primary-gradient);
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 1;
        }
        .user-info span {
            font-size: 14px;
            opacity: 0.9;
        }
        .logout {
            color: white;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            transition: var(--transition);
        }
        .logout:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }

        /* ===== 内容容器 ===== */
        .content {
            padding: 24px 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== 统计卡片 - 玻璃质感 ===== */
        .stats-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            margin-bottom: 24px;
            box-shadow: var(--glass-shadow);
            transition: var(--transition);
        }
        .stats-card:hover {
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        .stats-card h3 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .stat-item {
            flex: 1;
            padding: 4px 0;
            transition: var(--transition-bounce);
            cursor: default;
        }
        .stat-item:hover {
            transform: translateY(-3px);
        }
        .stat-item .number {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }
        .stat-item .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        /* ===== 筛选按钮 ===== */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding: 4px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }
        .filter-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 24px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-primary);
        }
        .filter-btn:hover {
            color: var(--primary-start);
            background: rgba(102, 126, 234, 0.08);
        }
        .filter-btn.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .filter-btn.active:hover {
            background: var(--primary-gradient-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        /* ===== 收入列表 ===== */
        .income-list {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
        }
        .list-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }
        .list-item {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover {
            background: rgba(102, 126, 234, 0.04);
            padding-left: 24px;
        }
        .item-info { flex: 1; }
        .item-title {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 14px;
        }
        .item-time {
            font-size: 12px;
            color: var(--text-light);
        }
        .item-amount {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-green);
            letter-spacing: -0.3px;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state div {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* ===== 底部导航 ===== */
        footer {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 0;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(0,0,0,0.05);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: var(--nav-height);
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            padding: 4px 12px;
            border-radius: var(--radius-sm);
        }
        .footer-item:hover {
            color: var(--primary-start);
            background: rgba(102, 126, 234, 0.06);
        }
        .footer-item.active {
            color: var(--primary-start);
        }
        .footer-item.active::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--primary-gradient);
            border-radius: 0 0 4px 4px;
        }
        .footer-item svg {
            width: 24px;
            height: 24px;
            transition: var(--transition);
        }
        .footer-item.active svg {
            stroke: var(--primary-start);
            filter: drop-shadow(0 2px 4px rgba(102,126,234,0.3));
        }
        .footer-item span {
            font-size: 11px;
            font-weight: 500;
        }

        /* ===== 夜间模式 ===== */
        body.dark-mode {
            --bg-page: #0f0f23;
            --glass-bg: rgba(22, 33, 62, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            --card-shadow-hover: 0 8px 30px rgba(102, 126, 234, 0.15);
            --text-primary: #e8e6e3;
            --text-secondary: #9ca3af;
            --text-light: #6b7280;
        }
        body.dark-mode .stats-card { background: var(--glass-bg); }
        body.dark-mode .stats-card h3 { color: var(--text-secondary); }
        body.dark-mode .filter-bar { background: var(--glass-bg); }
        body.dark-mode .filter-btn { color: var(--text-secondary); }
        body.dark-mode .filter-btn:hover { color: var(--primary-start); background: rgba(102, 126, 234, 0.15); }
        body.dark-mode .income-list { background: var(--glass-bg); }
        body.dark-mode .list-header { color: var(--text-primary); border-bottom-color: rgba(255,255,255,0.04); }
        body.dark-mode .list-item { border-bottom-color: rgba(255,255,255,0.04); }
        body.dark-mode .list-item:hover { background: rgba(102, 126, 234, 0.1); }
        body.dark-mode .item-title { color: var(--text-primary); }
        body.dark-mode .item-time { color: var(--text-light); }
        body.dark-mode footer { background: var(--glass-bg); border-top-color: rgba(255,255,255,0.05); }
        body.dark-mode .footer-item:hover { background: rgba(102, 126, 234, 0.1); }
    </style>
</head>
<body>
    <header>
        <h1>💰 收入明细</h1>
        <div class="user-info">
            <span>欢迎, [[${rider.name}]]</span>
            <a href="/rider/logout" class="logout">退出</a>
        </div>
    </header>

    <div class="content">
        <div class="stats-card">
            <h3>收入统计</h3>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="number">¥[[${totalIncome}]]</div>
                    <div class="label">累计收入</div>
                </div>
                <div class="stat-item">
                    <div class="number">¥[[${monthIncome}]]</div>
                    <div class="label">本月收入</div>
                </div>
                <div class="stat-item">
                    <div class="number">¥[[${todayIncome}]]</div>
                    <div class="label">今日收入</div>
                </div>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterOrders('all')">全部</button>
            <button class="filter-btn" onclick="filterOrders('today')">今日</button>
            <button class="filter-btn" onclick="filterOrders('month')">本月</button>
            <button class="filter-btn" onclick="filterOrders('lastMonth')">上月</button>
        </div>

        <div class="income-list">
            <div class="list-header">收入记录</div>
            <div th:if="${incomeList != null && !incomeList.isEmpty()}">
                <div th:each="item : ${incomeList}" class="list-item">
                    <div class="item-info">
                        <div class="item-title">订单 #[[${item.orderId}]]</div>
                        <div class="item-time">[[${item.time}]]</div>
                    </div>
                    <div class="item-amount">+¥[[${item.commission}]]</div>
                </div>
            </div>
            <div th:else class="empty-state">
                <div>📭</div>
                <p>暂无收入记录</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-item" onclick="location.href='/rider/index'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>首页</span></div>
        <div class="footer-item" onclick="location.href='/rider/pendingOrders'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 1.99-1.61L23 6H6"/></svg><span>订单</span></div>
        <div class="footer-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-6"/></svg><span>收入</span></div>
        <div class="footer-item" onclick="location.href='/rider/notifications'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span>消息</span></div>
        <div class="footer-item" onclick="location.href='/rider/profile'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>我的</span></div>
    </footer>

    <script>
        function filterOrders(type) {
            window.location.href = '/rider/income?type=' + type;
        }

        // ===== 夜间模式和字体大小初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            // 夜间模式初始化
            var nightMode = localStorage.getItem('nightMode');
            if (nightMode === 'true') {
                document.body.classList.add('dark-mode');
            }
            
            // 字体大小初始化
            var fontSize = localStorage.getItem('fontSize');
            if (fontSize) {
                document.documentElement.style.fontSize = fontSize + 'px';
            }
        });
    </script>
</body>
</html>
