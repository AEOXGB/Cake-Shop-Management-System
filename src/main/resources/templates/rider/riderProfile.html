<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑手个人中心</title>
    <link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS 变量 ===== */
        :root {
            --primary-start: #667eea;
            --primary-mid: #6c6ce0;
            --primary-end: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-gradient-hover: linear-gradient(135deg, #5a6fd9 0%, #6a4193 100%);
            --accent-orange: #ff6b35;
            --accent-green: #00c853;
            --bg-page: #f0f2f8;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(102, 126, 234, 0.12);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --card-shadow-hover: 0 8px 30px rgba(102, 126, 234, 0.18);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-primary: 'DM Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
            --nav-height: 70px;
        }

        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-primary);
            background: var(--bg-page);
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + 20px);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 页头 - 光晕效果 ===== */
        header {
            background: var(--primary-gradient);
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        header .logout {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            position: relative;
            z-index: 1;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.15);
        }
        header .logout:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-1px);
        }

        /* ===== 容器 ===== */
        .profile-container {
            padding: 24px 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* ===== 用户卡片 - 毛玻璃效果 ===== */
        .user-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 28px 20px;
            box-shadow: var(--glass-shadow);
            text-align: center;
            margin-bottom: 24px;
            transition: var(--transition);
        }
        .user-card:hover {
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: var(--primary-gradient);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }
        .avatar::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .avatar svg {
            width: 42px;
            height: 42px;
            color: white;
        }
        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .user-phone {
            font-size: 14px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        /* ===== 统计数据网格 ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-md);
            padding: 16px 10px;
            text-align: center;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--glass-border);
            transition: var(--transition-bounce);
            cursor: default;
        }
        .stat-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--card-shadow-hover);
        }
        .stat-card .number {
            font-size: 22px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }
        .stat-card .label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        /* ===== 菜单列表 ===== */
        .menu-list {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            transition: var(--transition);
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover {
            background: rgba(102, 126, 234, 0.06);
            padding-left: 24px;
        }
        .menu-item:active {
            transform: scale(0.98);
        }
        .menu-item svg {
            width: 22px;
            height: 22px;
            stroke: var(--primary-start);
            margin-right: 16px;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .menu-item:hover svg {
            stroke: var(--primary-end);
            transform: scale(1.1);
        }
        .menu-item span {
            font-size: 15px;
            color: var(--text-primary);
            font-weight: 500;
        }
        .menu-item .arrow {
            margin-left: auto;
            color: var(--text-light);
            font-size: 18px;
            transition: var(--transition);
        }
        .menu-item:hover .arrow {
            color: var(--primary-start);
            transform: translateX(4px);
        }
        .menu-item.logout-item svg { stroke: #ff5252; }
        .menu-item.logout-item span:first-of-type { color: #ff5252; }
        .menu-item.logout-item:hover { background: rgba(255,82,82,0.06); }
        .menu-item.logout-item:hover svg { stroke: #ff1744; }

        /* ===== 底部导航 ===== */
        footer {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 0;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(0,0,0,0.05);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: var(--nav-height);
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            padding: 4px 12px;
            border-radius: var(--radius-sm);
        }
        .footer-item:hover {
            color: var(--primary-start);
            background: rgba(102, 126, 234, 0.06);
        }
        .footer-item.active {
            color: var(--primary-start);
        }
        .footer-item.active::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--primary-gradient);
            border-radius: 0 0 4px 4px;
        }
        .footer-item svg {
            width: 24px;
            height: 24px;
            transition: var(--transition);
        }
        .footer-item.active svg {
            stroke: var(--primary-start);
            filter: drop-shadow(0 2px 4px rgba(102,126,234,0.3));
        }
        .footer-item span {
            font-size: 11px;
            font-weight: 500;
        }

        /* ===== 夜间模式 ===== */
        body.dark-mode {
            --bg-page: #0f0f23;
            --glass-bg: rgba(22, 33, 62, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            --card-shadow-hover: 0 8px 30px rgba(102, 126, 234, 0.15);
            --text-primary: #e8e6e3;
            --text-secondary: #9ca3af;
            --text-light: #6b7280;
        }
        body.dark-mode .user-card { background: var(--glass-bg); }
        body.dark-mode .user-name { color: var(--text-primary); }
        body.dark-mode .stat-card { background: var(--glass-bg); }
        body.dark-mode .menu-list { background: var(--glass-bg); }
        body.dark-mode .menu-item { border-bottom-color: rgba(255,255,255,0.04); }
        body.dark-mode .menu-item:hover { background: rgba(102, 126, 234, 0.1); }
        body.dark-mode footer { background: var(--glass-bg); border-top-color: rgba(255,255,255,0.05); }
        body.dark-mode .footer-item:hover { background: rgba(102, 126, 234, 0.1); }
    </style>
</head>
<body>
    <header>
        <h1>个人中心</h1>
        <a href="/rider/logout" class="logout">退出</a>
    </header>

    <div class="profile-container">
        <div class="user-card">
            <div class="avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="user-name">[[${rider.name}]]</div>
            <div class="user-phone">[[${rider.phone}]]</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="number">[[${todayCount}]]</div>
                <div class="label">今日配送</div>
            </div>
            <div class="stat-card">
                <div class="number">[[${monthCount}]]</div>
                <div class="label">本月配送</div>
            </div>
            <div class="stat-card">
                <div class="number">[[${totalOrders}]]</div>
                <div class="label">累计配送</div>
            </div>
            <div class="stat-card">
                <div class="number">¥[[${totalIncome}]]</div>
                <div class="label">累计收入</div>
            </div>
        </div>

        <div class="menu-list">
            <div class="menu-item" onclick="location.href='/rider/completedOrders'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 11V7a4 4 0 0 0-8 0v4M5 9h14l1 12H4L5 9"/></svg>
                <span>订单记录</span>
                <span class="arrow">›</span>
            </div>
            <div class="menu-item" onclick="location.href='/rider/income'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
                <span>收入明细</span>
                <span class="arrow">›</span>
            </div>
            <div class="menu-item" onclick="location.href='/rider/notifications'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 12a4 4 0 1 0-8 0 4 4 0 0 0 8 0zm0 0v1.5a2.5 2.5 0 0 0 5 0V12a9 9 0 1 0-9 9m4.5-1.206a8.959 8.959 0 0 1-4.5 1.207"/></svg>
                <span>消息通知</span>
                <span class="arrow">›</span>
            </div>
            <div class="menu-item" onclick="location.href='/rider/settings'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
                <span>设置</span>
                <span class="arrow">›</span>
            </div>
            <div class="menu-item logout-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
                <span>退出登录</span>
                <span class="arrow">›</span>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-item" onclick="location.href='/rider/index'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>首页</span>
        </div>
        <div class="footer-item" onclick="location.href='/rider/pendingOrders'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 11V7a4 4 0 0 0-8 0v4M5 9h14l1 12H4L5 9"/></svg>
            <span>订单</span>
        </div>
        <div class="footer-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>我的</span>
        </div>
    </footer>

    <script>
        // ===== 夜间模式和字体大小初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            // 夜间模式初始化
            var nightMode = localStorage.getItem('nightMode');
            if (nightMode === 'true') {
                document.body.classList.add('dark-mode');
            }
            
            // 字体大小初始化
            var fontSize = localStorage.getItem('fontSize');
            if (fontSize) {
                document.documentElement.style.fontSize = fontSize + 'px';
            }
        });
    </script>
</body>
</html>
