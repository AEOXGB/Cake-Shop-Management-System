<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骑手端首页</title>
    <link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* ===== CSS 变量定义主题 ===== */
        :root {
            --primary-start: #FF6B35;
            --primary-end: #F7C948;
            --gradient-main: linear-gradient(135deg, #FF6B35, #F7C948);
            --gradient-accent: linear-gradient(135deg, #FF416C, #FF4B2B);
            --gradient-bg: linear-gradient(135deg, #FFF3E0 0%, #FFF8E1 50%, #E8F5E9 100%);
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.4);
            --card-shadow: 0 8px 32px rgba(255, 107, 53, 0.12);
            --card-shadow-hover: 0 16px 48px rgba(255, 107, 53, 0.22);
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --text-light: #B2BEC3;
            --number-gradient: linear-gradient(135deg, #FF6B35, #FF2D55);
            --footer-active: #FF6B35;
            --glass-border: rgba(255, 255, 255, 0.3);
            --glow-color: rgba(255, 107, 53, 0.3);
            --hover-lift: -6px;
            --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== 夜间模式变量覆盖 ===== */
        body.dark-mode {
            --gradient-bg: linear-gradient(135deg, #0F0C29, #1A1A3E, #24243E);
            --card-bg: rgba(30, 27, 75, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --card-shadow-hover: 0 16px 48px rgba(0, 0, 0, 0.45);
            --text-primary: #EAEAEA;
            --text-secondary: #A0A0C0;
            --text-light: #6B6B8D;
            --glass-border: rgba(255, 255, 255, 0.06);
            --glow-color: rgba(255, 107, 53, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html { font-size: 16px; }
        body {
            font-family: 'DM Sans', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: var(--gradient-bg);
            min-height: 100vh;
            padding-bottom: 85px;
            color: var(--text-primary);
            transition: background 0.5s ease, color 0.4s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== 背景装饰光晕 ===== */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
            opacity: 0.5;
        }
        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.25), transparent 70%);
            top: -120px;
            right: -100px;
            animation: glowA 12s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(247, 201, 72, 0.2), transparent 70%);
            bottom: 60px;
            left: -80px;
            animation: glowB 15s ease-in-out infinite alternate;
        }
        body.dark-mode::before {
            background: radial-gradient(circle, rgba(255, 107, 53, 0.12), transparent 70%);
        }
        body.dark-mode::after {
            background: radial-gradient(circle, rgba(247, 201, 72, 0.08), transparent 70%);
        }

        @keyframes glowA {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(-60px, 40px) scale(1.15); }
            100% { transform: translate(40px, -30px) scale(0.95); }
        }
        @keyframes glowB {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(50px, -30px) scale(1.1); }
            100% { transform: translate(-30px, 20px) scale(0.9); }
        }

        /* ===== 页头 ===== */
        header {
            background: linear-gradient(135deg, #FF6B35 0%, #FF8E53 40%, #F7C948 100%);
            color: white;
            padding: 16px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 30px rgba(255, 107, 53, 0.25);
        }
        /* 页头装饰光晕 */
        header::before {
            content: '';
            position: absolute;
            top: -60%;
            left: 20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: headerGlow 8s ease-in-out infinite alternate;
        }
        @keyframes headerGlow {
            0%   { transform: translateX(0) scale(1); opacity: 0.5; }
            100% { transform: translateX(80px) scale(1.3); opacity: 0.9; }
        }
        header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        header .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1;
        }
        header .user-info span {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.95;
        }
        header .logout {
            background: rgba(255,255,255,0.22);
            padding: 7px 16px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            transition: var(--transition-smooth);
            backdrop-filter: blur(4px);
        }
        header .logout:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        .content {
            padding-top: 75px;
            position: relative;
            z-index: 1;
        }

        /* ===== 统计卡片 ===== */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            padding: 20px 20px 10px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px 14px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        /* 卡片顶部装饰条 */
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: var(--gradient-main);
            border-radius: 0 0 6px 6px;
            opacity: 0;
            transition: var(--transition-smooth);
        }
        .stat-card:hover::before {
            left: 10%;
            right: 10%;
            opacity: 1;
        }
        .stat-card:hover {
            transform: translateY(var(--hover-lift));
            box-shadow: var(--card-shadow-hover);
            border-color: rgba(255, 107, 53, 0.3);
        }
        /* 卡片背景动态光效 */
        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 107, 53, 0.06), transparent 60%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .stat-card:hover::after {
            opacity: 1;
        }
        .stat-card .number {
            font-size: 30px;
            font-weight: 800;
            background: var(--number-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            letter-spacing: -0.5px;
        }
        .stat-card .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 500;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
        }
        .stat-card:active {
            transform: translateY(-2px) scale(0.97);
        }

        /* ===== 图表容器 ===== */
        .charts-container {
            padding: 10px 20px 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }
        .chart-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            box-shadow: var(--card-shadow);
            transition: var(--transition-smooth);
        }
        .chart-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow-hover);
        }
        .chart-card h3 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .chart {
            height: 250px;
            width: 100%;
        }
        .full-width-chart {
            grid-column: span 2;
        }
        .full-width-chart .chart {
            height: 300px;
        }

        /* ===== 底部导航 ===== */
        footer {
            background: var(--card-bg);
            padding: 10px 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--card-border);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 -4px 30px rgba(0,0,0,0.06);
            height: 68px;
        }
        .footer-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            padding: 6px 16px;
            -webkit-tap-highlight-color: transparent;
        }
        .footer-item:hover {
            color: var(--text-secondary);
        }
        /* 活跃指示器 - 浮动圆点 */
        .footer-item.active {
            color: var(--footer-active);
        }
        .footer-item.active::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--gradient-main);
            border-radius: 0 0 4px 4px;
            animation: indicatorPulse 2s ease-in-out infinite;
        }
        @keyframes indicatorPulse {
            0%, 100% { width: 24px; opacity: 1; }
            50% { width: 36px; opacity: 0.7; }
        }
        .footer-item svg {
            width: 26px;
            height: 26px;
            transition: var(--transition-smooth);
        }
        .footer-item.active svg {
            transform: translateY(-2px);
            filter: drop-shadow(0 2px 8px rgba(255, 107, 53, 0.4));
        }
        .footer-item span {
            font-size: 11px;
            font-weight: 500;
            transition: var(--transition-smooth);
        }
        .footer-item.active span {
            font-weight: 600;
        }
        .footer-item:active {
            transform: scale(0.92);
        }

        /* ===== 页面进入动画 ===== */
        .stat-card {
            animation: fadeUp 0.6s ease both;
        }
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        .stat-card:nth-child(5) { animation-delay: 0.25s; }

        .chart-card {
            animation: fadeUp 0.7s ease both;
        }
        .chart-card:nth-child(1) { animation-delay: 0.2s; }
        .chart-card:nth-child(2) { animation-delay: 0.25s; }
        .chart-card:nth-child(3) { animation-delay: 0.3s; }
        .chart-card:nth-child(4) { animation-delay: 0.35s; }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 响应式适配 ===== */
        @media (max-width: 768px) {
            .stats-container {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 16px 12px 6px;
            }
            .stat-card {
                padding: 14px 8px;
                border-radius: 14px;
            }
            .stat-card .number {
                font-size: 24px;
            }
            .charts-container {
                grid-template-columns: 1fr;
                padding: 6px 12px 20px;
                gap: 14px;
            }
            .full-width-chart {
                grid-column: span 1;
            }
            .full-width-chart .chart {
                height: 250px;
            }
            header h1 {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-card .number {
                font-size: 22px;
            }
        }

        /* ===== 夜间模式补充调整 ===== */
        body.dark-mode header {
            background: linear-gradient(135deg, #1A1A3E 0%, #2D2B55 50%, #1A1A3E 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }
        body.dark-mode header .logout {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.1);
        }
        body.dark-mode header .logout:hover {
            background: rgba(255,255,255,0.15);
        }
        body.dark-mode footer {
            border-top-color: rgba(255, 255, 255, 0.06);
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.3);
        }
        body.dark-mode .stat-card:hover {
            border-color: rgba(255, 107, 53, 0.2);
        }
        body.dark-mode .footer-item.active svg {
            filter: drop-shadow(0 2px 8px rgba(255, 107, 53, 0.25));
        }
        body.dark-mode .footer-item.active::before {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <h1>🍰 骑手端</h1>
        <div class="user-info">
            <span>欢迎, [[${rider.name}]]</span>
            <a href="/rider/logout" class="logout">退出</a>
        </div>
    </header>

    <div class="content">
        <div class="stats-container">
            <div class="stat-card" onclick="location.href='/rider/pendingOrders'">
                <div class="number">[[${pendingCount}]]</div>
                <div class="label">待接单</div>
            </div>
            <div class="stat-card" onclick="location.href='/rider/pickupOrders'">
                <div class="number">[[${pickupCount}]]</div>
                <div class="label">待取货</div>
            </div>
            <div class="stat-card" onclick="location.href='/rider/deliveringOrders'">
                <div class="number">[[${deliveringCount}]]</div>
                <div class="label">配送中</div>
            </div>
            <div class="stat-card" onclick="location.href='/rider/completedOrders'">
                <div class="number">[[${completedCount}]]</div>
                <div class="label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="number">¥[(${totalCommission})]</div>
                <div class="label">累计佣金</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-card">
                <h3>📊 订单状态分布</h3>
                <div id="pieChart" class="chart"></div>
            </div>
            <div class="chart-card">
                <h3>📈 本周配送统计</h3>
                <div id="barChart" class="chart"></div>
            </div>
            <div class="chart-card full-width-chart">
                <h3>📉 月度配送趋势</h3>
                <div id="lineChart" class="chart"></div>
            </div>
            <div class="chart-card">
                <h3>🎯 能力分析</h3>
                <div id="radarChart" class="chart"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-item active" onclick="location.href='/rider/index'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>首页</span>
        </div>
        <div class="footer-item" onclick="location.href='/rider/pendingOrders'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M16 11V7a4 4 0 0 0-8 0v4M5 9h14l1 12H4L5 9"/>
            </svg>
            <span>订单</span>
        </div>
        <div class="footer-item" onclick="location.href='/rider/profile'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span>我的</span>
        </div>
    </footer>

    <script>
        var pendingCount = [[${pendingCount}]];
        var pickupCount = [[${pickupCount}]];
        var deliveringCount = [[${deliveringCount}]];
        var completedCount = [[${completedCount}]];

        var pieChart = echarts.init(document.getElementById('pieChart'));
        var pieOption = {
            tooltip: {
                trigger: 'item'
            },
            legend: {
                top: '5%',
                left: 'center'
            },
            series: [
                {
                    name: '订单状态',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: {
                        show: false,
                        position: 'center'
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 24,
                            fontWeight: 'bold'
                        }
                    },
                    labelLine: {
                        show: false
                    },
                    data: [
                        { value: pendingCount, name: '待接单', itemStyle: { color: '#ff9800' } },
                        { value: pickupCount, name: '待取货', itemStyle: { color: '#2196f3' } },
                        { value: deliveringCount, name: '配送中', itemStyle: { color: '#4caf50' } },
                        { value: completedCount, name: '已完成', itemStyle: { color: '#9c27b0' } }
                    ]
                }
            ]
        };
        pieChart.setOption(pieOption);

        var barChart = echarts.init(document.getElementById('barChart'));
        var barOption = {
            xAxis: {
                type: 'category',
                data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日']
            },
            yAxis: {
                type: 'value'
            },
            series: [
                {
                    data: [5, 12, 8, 15, 10, 18, 12],
                    type: 'bar',
                    itemStyle: {
                        borderRadius: [8, 8, 0, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#667eea' },
                            { offset: 1, color: '#764ba2' }
                        ])
                    }
                }
            ]
        };
        barChart.setOption(barOption);

        var lineChart = echarts.init(document.getElementById('lineChart'));
        var lineOption = {
            tooltip: {
                trigger: 'axis'
            },
            legend: {
                data: ['配送订单', '佣金收入']
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: ['1日', '5日', '10日', '15日', '20日', '25日', '30日']
            },
            yAxis: [
                {
                    type: 'value',
                    name: '订单数'
                },
                {
                    type: 'value',
                    name: '佣金(元)'
                }
            ],
            series: [
                {
                    name: '配送订单',
                    type: 'line',
                    smooth: true,
                    data: [30, 45, 38, 52, 48, 60, 55],
                    lineStyle: {
                        color: '#667eea',
                        width: 3
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(102, 126, 234, 0.3)' },
                            { offset: 1, color: 'rgba(102, 126, 234, 0.05)' }
                        ])
                    }
                },
                {
                    name: '佣金收入',
                    type: 'line',
                    smooth: true,
                    yAxisIndex: 1,
                    data: [150, 225, 190, 260, 240, 300, 275],
                    lineStyle: {
                        color: '#4caf50',
                        width: 3
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(76, 175, 80, 0.3)' },
                            { offset: 1, color: 'rgba(76, 175, 80, 0.05)' }
                        ])
                    }
                }
            ]
        };
        lineChart.setOption(lineOption);

        var radarChart = echarts.init(document.getElementById('radarChart'));
        var radarOption = {
            radar: {
                indicator: [
                    { name: '配送速度', max: 100 },
                    { name: '服务态度', max: 100 },
                    { name: '准时率', max: 100 },
                    { name: '好评率', max: 100 },
                    { name: '接单率', max: 100 }
                ]
            },
            series: [
                {
                    name: '能力分析',
                    type: 'radar',
                    data: [
                        {
                            value: [85, 92, 88, 95, 80],
                            name: '当前能力',
                            areaStyle: {
                                color: 'rgba(102, 126, 234, 0.3)'
                            },
                            lineStyle: {
                                color: '#667eea'
                            }
                        }
                    ]
                }
            ]
        };
        radarChart.setOption(radarOption);

        window.addEventListener('resize', function() {
            pieChart.resize();
            barChart.resize();
            lineChart.resize();
            radarChart.resize();
        });

        // ===== 夜间模式和字体大小初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            // 夜间模式初始化
            var nightMode = localStorage.getItem('nightMode');
            if (nightMode === 'true') {
                document.body.classList.add('dark-mode');
            }
            
            // 字体大小初始化
            var fontSize = localStorage.getItem('fontSize');
            if (fontSize) {
                document.documentElement.style.fontSize = fontSize + 'px';
            }
        });
    </script>
</body>
</html>
