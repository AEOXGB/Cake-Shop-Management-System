<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知</title>
    <link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS 变量 ===== */
        :root {
            --primary-start: #667eea;
            --primary-mid: #6c6ce0;
            --primary-end: #764ba2;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-gradient-hover: linear-gradient(135deg, #5a6fd9 0%, #6a4193 100%);
            --accent-orange: #ff6b35;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --bg-page: #f0f2f8;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(102, 126, 234, 0.12);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --card-shadow-hover: 0 8px 30px rgba(102, 126, 234, 0.18);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-primary: 'DM Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
        }

        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-primary);
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 页头 - 光晕效果 ===== */
        header {
            background: var(--primary-gradient);
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition);
        }
        header a:hover {
            opacity: 0.85;
        }
        header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }
        header .unread-badge {
            background: #f44336;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            position: relative;
            z-index: 1;
            box-shadow: 0 2px 8px rgba(244,67,54,0.3);
            animation: badgePulse 2s ease-in-out infinite;
        }
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 2px 12px rgba(244,67,54,0.4); }
        }

        /* ===== 容器 ===== */
        .container {
            padding: 24px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== 筛选选项卡 ===== */
        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            padding: 4px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }
        .filter-tabs button {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
            font-family: var(--font-primary);
        }
        .filter-tabs button:hover {
            color: var(--primary-start);
            background: rgba(102, 126, 234, 0.08);
        }
        .filter-tabs button.active {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .filter-tabs button.active:hover {
            background: var(--primary-gradient-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        /* ===== 通知列表 ===== */
        .notification-list {
            max-width: 600px;
            margin: 0 auto;
        }

        .notification-item {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 14px;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
            box-shadow: var(--card-shadow);
        }
        .notification-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
        }
        .notification-item.unread {
            border-left: 4px solid var(--primary-start);
            background: linear-gradient(135deg, rgba(102,126,234,0.06), var(--glass-bg));
        }
        .notification-item.read {
            border-left: 4px solid transparent;
            opacity: 0.7;
        }
        .notification-item.read:hover {
            opacity: 0.85;
        }

        /* ===== 通知图标 ===== */
        .icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .notification-item:hover .icon {
            transform: scale(1.1);
        }
        .icon.order {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            color: #ff9800;
        }
        .icon.system {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            color: #2196f3;
        }
        .icon.income {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #4caf50;
        }

        /* ===== 通知内容 ===== */
        .content {
            flex: 1;
            min-width: 0;
        }
        .content h4 {
            margin: 0 0 4px 0;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
        }
        .content p {
            margin: 0 0 6px 0;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }
        .content .time {
            color: var(--text-light);
            font-size: 12px;
        }

        /* ===== 未读红点标记 ===== */
        .unread .icon::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background: #f44336;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(244,67,54,0.4);
            animation: dotPulse 2s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .icon { position: relative; }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
            display: block;
            font-style: normal;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* ===== 夜间模式 ===== */
        body.dark-mode {
            --bg-page: #0f0f23;
            --glass-bg: rgba(22, 33, 62, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            --card-shadow-hover: 0 8px 30px rgba(102, 126, 234, 0.15);
            --text-primary: #e8e6e3;
            --text-secondary: #9ca3af;
            --text-light: #6b7280;
        }
        body.dark-mode .notification-item { background: var(--glass-bg); }
        body.dark-mode .notification-item.unread { background: linear-gradient(135deg, rgba(102,126,234,0.12), var(--glass-bg)); }
        body.dark-mode .content h4 { color: var(--text-primary); }
        body.dark-mode .content p { color: var(--text-secondary); }
        body.dark-mode .content .time { color: var(--text-light); }
        body.dark-mode .empty-state { color: var(--text-light); }
        body.dark-mode .filter-tabs { background: var(--glass-bg); }
        body.dark-mode .filter-tabs button { color: var(--text-secondary); }
        body.dark-mode .filter-tabs button:hover { color: var(--primary-start); background: rgba(102, 126, 234, 0.15); }
        body.dark-mode .icon.order { background: linear-gradient(135deg, #3e2723, #4e342e); color: #ff9800; }
        body.dark-mode .icon.system { background: linear-gradient(135deg, #1a237e, #283593); color: #64b5f6; }
        body.dark-mode .icon.income { background: linear-gradient(135deg, #1b5e20, #2e7d32); color: #81c784; }
    </style>
</head>
<body>
    <header>
        <a href="/rider/index">← 返回</a>
        <h1>消息通知</h1>
        <span th:if="${unreadCount > 0}" class="unread-badge" th:text="${unreadCount} + '条未读'"></span>
        <span th:else></span>
    </header>

    <div class="container">
        <div class="filter-tabs">
            <button th:class="${type == 'all' ? 'active' : ''}" onclick="location.href='/rider/notifications?type=all'">全部</button>
            <button th:class="${type == 'order' ? 'active' : ''}" onclick="location.href='/rider/notifications?type=order'">订单</button>
            <button th:class="${type == 'system' ? 'active' : ''}" onclick="location.href='/rider/notifications?type=system'">系统</button>
            <button th:class="${type == 'income' ? 'active' : ''}" onclick="location.href='/rider/notifications?type=income'">收入</button>
        </div>

        <div class="notification-list" th:if="${notifications != null && !notifications.isEmpty()}">
            <div th:each="item : ${notifications}" th:class="|notification-item ${item.isRead == 0 ? 'unread' : 'read'}|">
                <div th:class="|icon ${item.type}|">
                    <span th:if="${item.type == 'order'}">📦</span>
                    <span th:if="${item.type == 'system'}">⚙️</span>
                    <span th:if="${item.type == 'income'}">💰</span>
                </div>
                <div class="content">
                    <h4 th:text="${item.title}"></h4>
                    <p th:text="${item.content}"></p>
                    <span class="time" th:text="${item.time}"></span>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${notifications == null || notifications.isEmpty()}">
            <i>📭</i>
            <p>暂无消息通知</p>
        </div>
    </div>

    <script>
        // ===== 夜间模式和字体大小初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            // 夜间模式初始化
            var nightMode = localStorage.getItem('nightMode');
            if (nightMode === 'true') {
                document.body.classList.add('dark-mode');
            }
            
            // 字体大小初始化
            var fontSize = localStorage.getItem('fontSize');
            if (fontSize) {
                document.documentElement.style.fontSize = fontSize + 'px';
            }
        });
    </script>
</body>
</html>
