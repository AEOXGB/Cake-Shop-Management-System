<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>新品上市</title>
<link rel="icon" type="image/jpeg" href="/picture/logo.jpg">

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<link type="text/css" rel="stylesheet" th:href="@{/css/main.css}">
<link type="text/css" rel="stylesheet" th:href="@{/css/zui.min.css}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
<script type="text/javascript" th:src="@{/js/zui.min.js}"></script>

<style type="text/css">
/* 页面头部 - 巧克力渐变 */
.newarrivals-header {
    text-align: center;
    padding: 50px 20px;
    background: linear-gradient(135deg, #2d1810 0%, #4a2a1a 100%);
    color: #F5E6D3;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
}
.newarrivals-header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(201, 169, 110, 0.08) 0%, transparent 60%);
    animation: shimmer 6s ease-in-out infinite;
}
@keyframes shimmer {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 20px); }
}
.newarrivals-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    margin-bottom: 10px;
    color: #C9A96E;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    position: relative;
}
.newarrivals-header p {
    font-size: 18px;
    opacity: 0.85;
    color: #F5E6D3;
    position: relative;
}
.newarrivals-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

/* 商品卡片 - 玻璃质感 */
.goods-card-wrapper {
    position: relative;
}
.goods-card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 18px;
    box-shadow: 0 4px 25px rgba(45, 24, 16, 0.08);
    margin-bottom: 30px;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    border: 1px solid rgba(201, 169, 110, 0.12);
}
.goods-card:hover {
    transform: translateY(-8px) scale(1.01);
    box-shadow: 0 16px 45px rgba(45, 24, 16, 0.15);
    border-color: rgba(201, 169, 110, 0.25);
}
.goods-content {
    display: flex;
    padding: 24px;
}
.goods-image {
    width: 300px;
    height: 300px;
    object-fit: cover;
    border-radius: 14px;
    box-shadow: 0 4px 15px rgba(45, 24, 16, 0.1);
}
.goods-info {
    flex: 1;
    padding: 20px 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.goods-name {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #2d1810;
    margin-bottom: 15px;
}
.goods-intro {
    font-size: 16px;
    color: #8B7355;
    line-height: 1.8;
    margin-bottom: 20px;
    flex: 1;
}
.goods-price {
    font-size: 32px;
    color: #4a2a1a;
    font-weight: 700;
    margin-bottom: 20px;
}
.goods-actions {
    display: flex;
    gap: 15px;
}

/* 按钮 - 金色渐变 */
.btn-add-cart {
    background: linear-gradient(135deg, #C9A96E 0%, #A68B5C 100%);
    color: white;
    border: none;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Noto Sans SC', sans-serif;
    box-shadow: 0 4px 15px rgba(201, 169, 110, 0.3);
}
.btn-add-cart:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(201, 169, 110, 0.45);
}
.btn-detail {
    background: transparent;
    color: #4a2a1a;
    border: 2px solid #4a2a1a;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Noto Sans SC', sans-serif;
}
.btn-detail:hover {
    background: #4a2a1a;
    color: #F5E6D3;
    transform: translateY(-2px);
}

/* 新品徽章 */
.new-badge {
    position: absolute;
    top: 20px;
    left: 20px;
    background: linear-gradient(135deg, #C9A96E 0%, #A68B5C 100%);
    color: white;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(201, 169, 110, 0.4);
    z-index: 10;
    border: 2px solid rgba(255,255,255,0.3);
}

/* 空状态 */
.empty-state {
    text-align: center;
    padding: 100px 20px;
}
.empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #A68B5C;
    margin-bottom: 20px;
}
.empty-state a {
    color: #C9A96E;
    font-size: 18px;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s;
}
.empty-state a:hover {
    color: #A68B5C;
}

/* 响应式 */
@media (max-width: 768px) {
    .goods-content {
        flex-direction: column;
    }
    .goods-image {
        width: 100%;
        height: 250px;
    }
    .goods-info {
        padding: 20px 0;
    }
    .newarrivals-header h1 {
        font-size: 32px;
    }
}
</style>

<script type="text/javascript">
function addToCart(goodsId) {
    // 检查用户是否登录
    var user = [[${session.user != null}]];
    if (!user) {
        alert('请先登录后再加入购物车');
        location.href = '/login.jsp';
        return;
    }
    
    // 发送加入购物车请求
    location.href = '/cart/addToCart?id=' + goodsId + '&flag=1';
}

function seeDetail(id) {
    location.href = '/goods/goodsList?id=' + id;
}
</script>

</head>
<body>

<div th:replace="admin/commons::topbar"></div>

<!-- 新品上市页面头部 -->
<div class="newarrivals-header">
    <h1>✨ 新品上市</h1>
    <p>最新上架，引领潮流时尚</p>
</div>

<!-- 新品商品列表 -->
<div class="newarrivals-container">
    <div th:if="${newArrivalsList == null || newArrivalsList.isEmpty()}" class="empty-state">
        <h3>暂无新品</h3>
        <a th:href="@{/goods/goodsList}">去购物</a>
    </div>
    
    <div th:each="goods, status : ${newArrivalsList}" class="goods-card-wrapper">
        <!-- 新品徽章 -->
        <div class="new-badge">NEW</div>
        
        <div class="goods-card">
            <div class="goods-content">
                <!-- 商品图片 -->
                <img alt="商品图片" th:src="${goods.cover}" class="goods-image">
                
                <!-- 商品信息 -->
                <div class="goods-info">
                    <h2 class="goods-name" th:text="${goods.name}">商品名称</h2>
                    <p class="goods-intro" th:text="${goods.intro}">商品描述</p>
                    <div class="goods-price">￥<span th:text="${goods.price}">0</span></div>
                    <div class="goods-actions">
                        <button class="btn-add-cart" th:onclick="'addToCart(' + ${goods.id} + ')'">
                            加入购物车
                        </button>
                        <button class="btn-detail" th:onclick="'seeDetail(' + ${goods.id} + ')'">
                            查看详情
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="admin/commons::footbar"></div>

</body>
</html>
