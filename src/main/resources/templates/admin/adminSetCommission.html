<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="content">
        <style>
            .commission-container {
                max-width: 600px;
                margin: 0 auto;
                padding: 40px;
            }
            .commission-card {
                background: white;
                border-radius: 16px;
                box-shadow: 0 8px 30px rgba(0,0,0,0.08);
                padding: 40px;
            }
            .commission-card h3 {
                font-size: 24px;
                color: #2d1810;
                margin-bottom: 30px;
                font-weight: 600;
            }
            .form-group {
                margin-bottom: 24px;
            }
            .form-group label {
                display: block;
                margin-bottom: 10px;
                font-size: 14px;
                color: #5a3a28;
                font-weight: 500;
            }
            .form-group input {
                width: 100%;
                padding: 14px 18px;
                border: 1px solid rgba(201, 169, 110, 0.3);
                border-radius: 12px;
                font-size: 16px;
                font-family: inherit;
                transition: all 0.3s;
                background: rgba(255, 255, 255, 0.8);
            }
            .form-group input:focus {
                border-color: #C9A96E;
                box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.15);
                outline: none;
            }
            .order-info {
                background: rgba(245, 230, 211, 0.3);
                padding: 20px;
                border-radius: 12px;
                margin-bottom: 24px;
            }
            .order-info p {
                margin: 8px 0;
                font-size: 14px;
                color: #5a3a28;
            }
            .order-info p span {
                font-weight: 600;
                color: #2d1810;
            }
            .btn {
                padding: 14px 32px;
                border-radius: 12px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                border: none;
                transition: all 0.3s ease;
                font-family: inherit;
            }
            .btn-primary {
                background: linear-gradient(135deg, #C9A96E, #A68B5C);
                color: white;
                box-shadow: 0 4px 15px rgba(201, 169, 110, 0.3);
            }
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(201, 169, 110, 0.4);
            }
            .btn-secondary {
                background: rgba(245, 230, 211, 0.4);
                color: #8a6d5b;
                border: 1px solid rgba(201, 169, 110, 0.15);
                margin-left: 12px;
            }
            .btn-secondary:hover {
                background: rgba(245, 230, 211, 0.6);
            }
            .msg-success {
                background: rgba(76, 175, 80, 0.1);
                color: #388e3c;
                padding: 12px 18px;
                border-radius: 8px;
                margin-bottom: 20px;
                font-size: 14px;
            }
            .msg-error {
                background: rgba(244, 67, 54, 0.1);
                color: #c62828;
                padding: 12px 18px;
                border-radius: 8px;
                margin-bottom: 20px;
                font-size: 14px;
            }
        </style>

        <div class="commission-container">
            <div class="commission-card">
                <h3>设置订单佣金</h3>
                
                <div th:if="${msg != null}" th:class="${msg.contains('成功') ? 'msg-success' : 'msg-error'}">
                    [[${msg}]]
                </div>

                <div th:if="${order != null}" class="order-info">
                    <p>订单号：<span>#[[${order.id}]]</span></p>
                    <p>订单金额：<span>¥[[${order.total}]]</span></p>
                    <p>当前佣金：<span th:text="${order.commission != null ? '¥' + order.commission : '未设置'}"></span></p>
                </div>

                <form th:action="@{/admin/setCommission}" method="post">
                    <input type="hidden" name="id" th:value="${order != null ? order.id : ''}">
                    
                    <div class="form-group">
                        <label for="commission">佣金金额（元）</label>
                        <input type="number" id="commission" name="commission" step="0.01" 
                               placeholder="请输入佣金金额" th:value="${order != null && order.commission != null ? order.commission : ''}">
                    </div>

                    <div style="display: flex; gap: 12px;">
                        <button type="submit" class="btn btn-primary">保存佣金</button>
                        <a href="/admin/orderList" class="btn btn-secondary">返回列表</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
