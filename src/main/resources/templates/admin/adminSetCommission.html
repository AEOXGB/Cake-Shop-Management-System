<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="content">
        <style>
            .commission-container {
                max-width: 600px;
                margin: 0 auto;
            }
            .commission-card {
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.6);
                box-shadow: 0 4px 30px rgba(45, 24, 16, 0.08);
                padding: 35px;
                animation: fadeInUp 0.5s ease;
            }
            .commission-card h3 {
                font-size: 22px;
                color: #2d1810;
                margin-bottom: 24px;
                font-weight: 600;
                position: relative;
                padding-left: 14px;
            }
            .commission-card h3::before {
                content: '';
                position: absolute;
                left: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 4px;
                height: 22px;
                background: linear-gradient(180deg, #C9A96E, #A68B5C);
                border-radius: 2px;
            }
            .form-group {
                margin-bottom: 24px;
            }
            .form-group label {
                display: block;
                margin-bottom: 8px;
                font-size: 14px;
                color: #5a3a28;
                font-weight: 600;
            }
            .form-group input {
                width: 100%;
                padding: 12px 16px;
                border: 1px solid rgba(0, 0, 0, 0.1);
                border-radius: 10px;
                font-size: 16px;
                font-family: inherit;
                transition: all 0.3s;
                background: rgba(255, 255, 255, 0.8);
                box-sizing: border-box;
            }
            .form-group input:focus {
                border-color: #C9A96E;
                box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.12);
                outline: none;
                background: #fff;
            }
            .order-info {
                background: rgba(245, 230, 211, 0.3);
                padding: 20px;
                border-radius: 12px;
                margin-bottom: 24px;
                border: 1px solid rgba(201, 169, 110, 0.12);
            }
            .order-info p {
                margin: 8px 0;
                font-size: 14px;
                color: #5a3a28;
            }
            .order-info p span {
                font-weight: 600;
                color: #2d1810;
            }
            .order-info .info-amount {
                color: #c0392b;
                font-weight: 700;
                font-size: 16px;
            }
            .msg-success {
                background: rgba(39, 174, 96, 0.1);
                border: 1px solid rgba(39, 174, 96, 0.2);
                color: #27ae60;
                padding: 12px 18px;
                border-radius: 10px;
                margin-bottom: 20px;
                font-size: 14px;
                font-weight: 500;
            }
            .msg-error {
                background: rgba(231, 76, 60, 0.1);
                border: 1px solid rgba(231, 76, 60, 0.2);
                color: #c0392b;
                padding: 12px 18px;
                border-radius: 10px;
                margin-bottom: 20px;
                font-size: 14px;
                font-weight: 500;
            }
            /* 夜间模式 */
            body.night-mode .commission-card {
                background: rgba(30, 30, 45, 0.92);
                border-color: rgba(255, 255, 255, 0.06);
            }
            body.night-mode .commission-card h3 {
                color: #e0d5c8;
            }
            body.night-mode .form-group label {
                color: #c0b5a8;
            }
            body.night-mode .form-group input {
                background: rgba(40, 40, 55, 0.8);
                border-color: rgba(255, 255, 255, 0.1);
                color: #e0d5c8;
            }
            body.night-mode .form-group input:focus {
                background: rgba(50, 50, 65, 0.9);
                border-color: #C9A96E;
            }
            body.night-mode .order-info {
                background: rgba(50, 50, 65, 0.4);
                border-color: rgba(201, 169, 110, 0.15);
            }
            body.night-mode .order-info p {
                color: #a09080;
            }
            body.night-mode .order-info p span {
                color: #e0d5c8;
            }
            body.night-mode .order-info .info-amount {
                color: #e74c3c;
            }
        </style>

        <div class="page-header">
            <div>
                <h2 class="page-title">设置订单佣金</h2>
                <p style="color: #8a6d5b; font-size: 14px; margin-top: 4px;">为配送订单设置骑手佣金</p>
            </div>
        </div>

        <div class="commission-container">
            <div class="commission-card">
                <h3>佣金设置</h3>

                <div th:if="${msg != null}" th:class="${msg.contains('成功') ? 'msg-success' : 'msg-error'}">
                    [[${msg}]]
                </div>

                <div th:if="${order != null}" class="order-info">
                    <p>订单号：<span>#[[${order.id}]]</span></p>
                    <p>订单金额：<span class="info-amount">¥[[${order.total}]]</span></p>
                    <p>当前佣金：<span th:text="${order.commission != null ? '¥' + order.commission : '未设置'}"></span></p>
                </div>

                <form th:action="@{/admin/setCommission}" method="post">
                    <input type="hidden" name="id" th:value="${order != null ? order.id : ''}">

                    <div class="form-group">
                        <label for="commission">佣金金额（元）</label>
                        <input type="number" id="commission" name="commission" step="0.01" 
                               placeholder="请输入佣金金额" 
                               th:value="${order != null && order.commission != null ? order.commission : ''}">
                    </div>

                    <div style="display: flex; gap: 12px;">
                        <button type="submit" class="btn btn-primary" style="flex:1; justify-content:center; padding:12px 22px; font-size:15px; font-weight:600;">保存佣金</button>
                        <a href="/admin/orderList" class="btn btn-secondary" style="padding:12px 22px; font-size:15px; font-weight:500; text-decoration:none;">返回列表</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
