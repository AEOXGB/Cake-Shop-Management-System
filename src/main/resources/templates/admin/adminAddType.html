<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="content">
        <style>
            .form-card {
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.6);
                box-shadow: 0 4px 30px rgba(45, 24, 16, 0.08);
                padding: 32px;
                max-width: 500px;
                animation: fadeInUp 0.5s ease;
            }
            .form-card .form-group {
                margin-bottom: 24px;
            }
            .form-card .form-group label {
                display: block;
                margin-bottom: 8px;
                font-weight: 600;
                color: #5a3a28;
                font-size: 14px;
            }
            .form-card .form-group label .required {
                color: #c0392b;
                margin-left: 2px;
            }
            .form-card .form-control {
                width: 100%;
                padding: 12px 16px;
                border: 1px solid rgba(0, 0, 0, 0.1);
                border-radius: 10px;
                font-size: 14px;
                transition: border-color 0.3s, box-shadow 0.3s;
                background: rgba(255, 255, 255, 0.8);
                font-family: inherit;
                box-sizing: border-box;
            }
            .form-card .form-control:focus {
                outline: none;
                border-color: #C9A96E;
                box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.12);
                background: #fff;
            }
            .form-card .form-actions {
                display: flex;
                gap: 12px;
                margin-top: 8px;
            }
            .form-card .form-actions .btn {
                flex: 1;
                justify-content: center;
                padding: 12px 22px;
                font-size: 15px;
                font-weight: 600;
            }
            .btn-cancel {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                padding: 12px 30px;
                background: rgba(0, 0, 0, 0.05);
                color: #8a6d5b;
                border: 1px solid rgba(0, 0, 0, 0.08);
                border-radius: 8px;
                font-size: 15px;
                font-weight: 500;
                text-decoration: none;
                font-family: inherit;
                cursor: pointer;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .btn-cancel:hover {
                background: rgba(0, 0, 0, 0.08);
                transform: translateY(-2px);
            }
            .page-subtitle {
                font-size: 14px;
                color: #8a6d5b;
                margin-top: 4px;
            }
        </style>

        <div class="page-header">
            <div>
                <h2 class="page-title" th:text="${type != null ? '编辑分类' : '添加分类'}">添加分类</h2>
                <div class="page-subtitle" th:text="${type != null ? '修改分类信息' : '创建新的商品分类'}">创建新的商品分类</div>
            </div>
        </div>

        <form class="form-card" th:action="@{${type != null ? '/admin/updateType' : '/admin/saveType'}}" method="post">
            <input type="hidden" name="id" th:value="${type?.id}">

            <div class="form-group">
                <label>分类名称 <span class="required">*</span></label>
                <input type="text" name="name" th:value="${type?.name}" placeholder="请输入分类名称" class="form-control">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/admin/categoryList}" class="btn-cancel">取消</a>
            </div>
        </form>
    </div>
</body>
</html>
