<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="content">
        <style>
            /* 表单卡片 - 玻璃效果 */
            .form-section {
                background: rgba(255, 255, 255, 0.92);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.6);
                box-shadow: 0 4px 30px rgba(45, 24, 16, 0.08);
                padding: 35px;
                max-width: 600px;
            }
            .form-label {
                display: block;
                margin-bottom: 8px;
                font-weight: 600;
                color: #5a3a28;
                font-size: 14px;
            }
            .form-control {
                width: 100%;
                padding: 12px 16px;
                border: 1px solid rgba(0, 0, 0, 0.1);
                border-radius: 10px;
                font-size: 14px;
                transition: border-color 0.3s, box-shadow 0.3s;
                background: rgba(255, 255, 255, 0.8);
                font-family: inherit;
            }
            .form-control:focus {
                outline: none;
                border-color: #C9A96E;
                box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.12);
                background: #fff;
            }
            .form-control:disabled {
                background: rgba(0, 0, 0, 0.04);
                color: #8a6d5b;
                cursor: not-allowed;
            }
            .form-group {
                margin-bottom: 22px;
            }
            .form-footer {
                margin-top: 30px;
                display: flex;
                gap: 15px;
                align-items: center;
            }
            .btn-submit {
                padding: 12px 32px;
                background: linear-gradient(135deg, #C9A96E, #A68B5C);
                color: #fff;
                border: none;
                border-radius: 10px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 4px 15px rgba(201, 169, 110, 0.3);
                font-family: inherit;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }
            .btn-submit:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(201, 169, 110, 0.4);
            }
            .btn-cancel {
                padding: 12px 30px;
                background: rgba(255, 255, 255, 0.6);
                color: #8a6d5b;
                border-radius: 10px;
                text-decoration: none;
                font-size: 15px;
                font-weight: 500;
                transition: all 0.3s;
                border: 1px solid rgba(0, 0, 0, 0.06);
                display: inline-flex;
                align-items: center;
                gap: 6px;
                font-family: inherit;
            }
            .btn-cancel:hover {
                background: rgba(255, 255, 255, 0.9);
                border-color: rgba(201, 169, 110, 0.3);
                color: #5a3a28;
            }
        </style>

        <!-- 页面标题 -->
        <div class="page-header">
            <div>
                <h2 class="page-title">修改用户信息</h2>
                <p style="color: #8a6d5b; font-size: 14px; margin-top: 4px;">编辑用户账户资料信息</p>
            </div>
        </div>

        <!-- 表单卡片 -->
        <form method="post" action="/admin/updateUser" class="form-section">
            <input type="hidden" name="userId" th:value="${user.id}">

            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" th:value="${user.username}" disabled class="form-control">
            </div>

            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" name="email" th:value="${user.email}" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">姓名</label>
                <input type="text" name="name" th:value="${user.name}" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">电话</label>
                <input type="text" name="phone" th:value="${user.phone}" class="form-control">
            </div>

            <div class="form-group">
                <label class="form-label">地址</label>
                <input type="text" name="address" th:value="${user.address}" class="form-control">
            </div>

            <div class="form-group">
                <label class="form-label">新密码（不填则不修改）</label>
                <input type="password" name="password" class="form-control" placeholder="如需修改密码请在此输入">
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-submit">保存修改</button>
                <a th:href="@{/admin/userList}" class="btn-cancel">取消</a>
            </div>
        </form>
    </div>
</body>
</html>
