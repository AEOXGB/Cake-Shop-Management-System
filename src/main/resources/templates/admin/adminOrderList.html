<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="content">
        <style>
            .order-status {
                display: inline-block;
                padding: 4px 14px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 500;
            }
            .order-status.status-2 {
                background: rgba(230, 126, 34, 0.15);
                color: #e67e22;
            }
            .order-status.status-3 {
                background: rgba(46, 204, 113, 0.15);
                color: #27ae60;
            }
            .order-status.status-4 {
                background: rgba(52, 152, 219, 0.15);
                color: #2980b9;
            }
            .order-status.status-5 {
                background: rgba(231, 76, 60, 0.15);
                color: #c0392b;
            }
            .action-link {
                display: inline-flex;
                align-items: center;
                padding: 5px 12px;
                border-radius: 6px;
                text-decoration: none;
                font-size: 12px;
                font-weight: 500;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                cursor: pointer;
            }
            .action-link:hover {
                transform: translateY(-1px);
            }
        </style>

        <div class="page-header">
            <h2 class="page-title">订单列表</h2>
        </div>

        <div class="search-box">
            <input type="text" placeholder="搜索订单号或收货人..." id="searchInput" th:value="${keyword}" onkeypress="if(event.keyCode==13){event.preventDefault();searchOrders();}">
            <button class="btn btn-primary" onclick="searchOrders()">搜索</button>
            <button class="btn btn-secondary" onclick="resetOrders()">重置</button>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>订单号</th>
                    <th>收货人</th>
                    <th>联系电话</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th>下单时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orderList}">
                    <td style="font-weight:500; color:#8a6d5b;">#<span th:text="${order.id}"></span></td>
                    <td th:text="${order.name}" style="font-weight:500; color:#2d1810;"></td>
                    <td th:text="${order.phone}" style="color:#666;"></td>
                    <td style="color:#c0392b; font-weight:600;">¥<span th:text="${order.total}"></span></td>
                    <td>
                        <span th:class="'order-status status-' + ${order.status}" th:text="${order.statusText}"></span>
                    </td>
                    <td style="color:#888; font-size:13px;" th:text="${order.datetime}"></td>
                    <td>
                        <div class="action-group" style="display:flex; gap:6px; justify-content:center;">
                            <a th:href="@{/admin/orderDetail(id=${order.id})}" 
                               class="btn btn-primary" style="padding:5px 12px; font-size:12px;">详情</a>
                            <a th:if="${order.status == 2 || order.status == 3}" th:href="@{/admin/setCommission(id=${order.id})}" 
                               class="btn btn-secondary" style="padding:5px 12px; font-size:12px;">设置佣金</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(orderList)}">
                    <td colspan="7" style="padding: 50px; text-align: center; color: #b8a99a;">暂无订单数据</td>
                </tr>
            </tbody>
        </table>
        
        <div class="pagination-container" style="margin-top: 28px; display: flex; justify-content: center; align-items: center; gap: 8px;">
            <span style="color: #8a6d5b; margin-right: 10px;">共 <strong>[[${totalItems}]]</strong> 条</span>
            
            <a th:if="${currentPage > 1}" 
               th:href="@{/admin/orderList(page=${currentPage - 1}, keyword=${keyword})}" 
               style="padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; color: #333; background: #fff;">上一页</a>
            
            <!-- 使用JavaScript生成分页 -->
            <span id="orderPagination" style="display: flex; gap: 4px;" 
                  th:data-total-pages="${totalPages}" 
                  th:data-current-page="${currentPage}" 
                  th:data-keyword="${keyword}"></span>
            
            <a th:if="${currentPage < totalPages}" 
               th:href="@{/admin/orderList(page=${currentPage + 1}, keyword=${keyword})}" 
               style="padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; color: #333; background: #fff;">下一页</a>
            
            <span style="color: #8a6d5b; margin-left: 10px;">共 <strong>[[${totalPages}]]</strong> 页</span>
        </div>
        
        <script>
            // 生成分页
            window.generateOrderPagination = function() {
                var container = document.getElementById('orderPagination');
                if (!container) return;
                
                var totalPages = parseInt(container.getAttribute('data-total-pages')) || 1;
                var currentPage = parseInt(container.getAttribute('data-current-page')) || 1;
                var keyword = container.getAttribute('data-keyword') || '';
                
                var html = '';
                for (var i = 1; i <= totalPages; i++) {
                    var activeClass = i === currentPage ? 'style="padding: 8px 16px; border-radius: 4px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none;"' : 'style="padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; color: #333; background: #fff;"';
                    var url = '/admin/orderList?page=' + i + (keyword ? '&keyword=' + encodeURIComponent(keyword) : '');
                    html += '<a href="' + url + '" ' + activeClass + '>' + i + '</a>';
                }
                container.innerHTML = html;
            };
            
            // 页面加载完成后生成分页
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', window.generateOrderPagination);
            } else {
                window.generateOrderPagination();
            }
            
            function searchOrders() {
                var keyword = document.getElementById('searchInput').value;
                var url = "[[@{/admin/orderList}]]?keyword=" + encodeURIComponent(keyword);
                if (typeof loadPage === 'function') {
                    loadPage(url);
                } else {
                    location.href = url;
                }
            }
            
            function resetOrders() {
                document.getElementById('searchInput').value = '';
                var url = "[[@{/admin/orderList}]]";
                if (typeof loadPage === 'function') {
                    loadPage(url);
                } else {
                    location.href = url;
                }
            }
        </script>
    </div>
</body>
</html>
