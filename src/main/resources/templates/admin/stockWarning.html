<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="content">
        <style>
            /* 库存预警专用样式 - 与 adminLayout 企业暗色仪表盘主题一致 */
            .warning-icon {
                font-size: 28px;
                position: relative;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
            .warning-icon::after {
                content: '';
                position: absolute;
                width: 100%;
                height: 100%;
                background: rgba(231, 76, 60, 0.15);
                border-radius: 50%;
                animation: pulse-warning 2s ease-in-out infinite;
            }
            @keyframes pulse-warning {
                0%, 100% { transform: scale(1); opacity: 0.6; }
                50% { transform: scale(1.3); opacity: 0.2; }
            }
            .threshold-section {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .threshold-section input {
                width: 100px;
                padding: 10px 14px;
                border: 1px solid rgba(0, 0, 0, 0.08);
                border-radius: 10px;
                font-size: 14px;
                font-family: inherit;
                background: rgba(255, 255, 255, 0.8);
                transition: all 0.3s;
            }
            .threshold-section input:focus {
                outline: none;
                border-color: #C9A96E;
                box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.1);
            }
            .current-threshold {
                font-size: 14px;
                color: #8a6d5b;
                margin-bottom: 20px;
                padding: 14px 20px;
                background: rgba(255, 255, 255, 0.6);
                border-radius: 10px;
                border: 1px solid rgba(0, 0, 0, 0.04);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .current-threshold strong {
                color: #C9A96E;
                font-weight: 700;
            }
            .warning-alert {
                color: #e74c3c;
                font-weight: 600;
            }
            .warning-alert strong {
                color: #c0392b;
            }
            .status-warning {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 5px 14px;
                background: rgba(231, 76, 60, 0.12);
                color: #c0392b;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                animation: glow-warning 2s ease-in-out infinite;
            }
            @keyframes glow-warning {
                0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.2); }
                50% { box-shadow: 0 0 0 6px rgba(231, 76, 60, 0.05); }
            }
            .stock-low {
                color: #c0392b;
                font-weight: 700;
                font-size: 16px;
            }
            .empty-state {
                text-align: center;
                padding: 60px 20px;
                color: #8a6d5b;
            }
            .empty-icon {
                font-size: 48px;
                margin-bottom: 16px;
                opacity: 0.5;
            }
            .empty-text {
                font-size: 16px;
            }
            /* 夜间模式 */
            body.night-mode .current-threshold {
                background: rgba(30, 30, 45, 0.6);
                border-color: rgba(255, 255, 255, 0.06);
                color: #a09080;
            }
            body.night-mode .current-threshold strong {
                color: #C9A96E;
            }
            body.night-mode .threshold-section input {
                background: rgba(40, 40, 55, 0.8);
                border-color: rgba(255, 255, 255, 0.1);
                color: #e0d5c8;
            }
            body.night-mode .threshold-section input:focus {
                border-color: #C9A96E;
            }
            body.night-mode .status-warning {
                background: rgba(231, 76, 60, 0.15);
                color: #e74c3c;
            }
            body.night-mode .stock-low {
                color: #e74c3c;
            }
        </style>

        <div class="page-header">
            <div>
                <h2 class="page-title">库存预警</h2>
                <p style="color: #8a6d5b; font-size: 14px; margin-top: 4px;">监控低库存商品，及时补货</p>
            </div>
            <div class="threshold-section">
                <input type="number" id="thresholdInput" th:value="${warningThreshold}" placeholder="阈值" min="1">
                <button class="btn btn-primary" onclick="setThreshold()">设置阈值</button>
                <button class="btn btn-success" onclick="searchWarning()">查询</button>
            </div>
        </div>

        <div class="current-threshold">
            <span>当前预警阈值：<strong th:text="${warningThreshold}">40</strong> 件</span>
            <span th:if="${warningCount > 0}" class="warning-alert">
                ⚠ 共 <strong th:text="${warningCount}">0</strong> 条预警商品
            </span>
            <span th:unless="${warningCount > 0}" style="color: #27ae60;">✅ 库存充足，无预警</span>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 60px;">ID</th>
                    <th>商品名称</th>
                    <th>分类</th>
                    <th style="width: 100px;">当前库存</th>
                    <th style="width: 120px;">状态</th>
                    <th style="width: 180px; text-align:center;">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="goods : ${warningGoodsList}">
                    <td style="color: #8a6d5b;">[[${goods.id}]]</td>
                    <td style="font-weight:500; color:#2d1810;">[[${goods.name} != null ? ${goods.name} : '未命名']]</td>
                    <td style="color:#666;">[[${goods.categoryName} != null ? ${goods.categoryName} : '未分类']]</td>
                    <td class="stock-low">[[${goods.stock}]]</td>
                    <td>
                        <span class="status-warning">⚠ 库存预警</span>
                    </td>
                    <td style="text-align:center;">
                        <div class="action-group" style="display:flex; gap:6px; justify-content:center;">
                            <a th:href="@{/admin/goodsDetail(id=${goods.id})}" class="btn btn-primary" style="padding:6px 14px; font-size:12px;">查看详情</a>
                            <a th:href="@{/admin/editGoods(id=${goods.id})}" class="btn btn-warning" style="padding:6px 14px; font-size:12px;">编辑</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(warningGoodsList)}">
                    <td colspan="6">
                        <div class="empty-state">
                            <div class="empty-icon">✅</div>
                            <div class="empty-text">暂无库存预警商品</div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <script type="text/javascript">
            function setThreshold() {
                var threshold = document.getElementById('thresholdInput').value;
                if (threshold && parseInt(threshold) > 0) {
                    window.location.href = '/admin/stockWarning?action=setThreshold&threshold=' + threshold;
                } else {
                    alert('请输入有效的阈值（大于0的整数）');
                }
            }
            function searchWarning() {
                var threshold = document.getElementById('thresholdInput').value;
                if (threshold && parseInt(threshold) > 0) {
                    window.location.href = '/admin/stockWarning?threshold=' + threshold;
                } else {
                    window.location.href = '/admin/stockWarning';
                }
            }
        </script>
    </div>
</body>
</html>
