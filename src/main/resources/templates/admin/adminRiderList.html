<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="content">
        <style>
            /* 骑手审核页面专用样式 - 与 adminLayout 主题一致 */
            .user-role {
                display: inline-block;
                padding: 4px 14px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 500;
            }
            .user-role.pending {
                background: rgba(230, 180, 80, 0.15);
                color: #b8860b;
            }
            .action-link {
                display: inline-flex;
                align-items: center;
                padding: 6px 14px;
                border-radius: 6px;
                text-decoration: none;
                font-size: 12px;
                font-weight: 500;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                cursor: pointer;
                gap: 4px;
            }
            .action-link:hover {
                transform: translateY(-1px);
            }
            .action-link.approve {
                background: linear-gradient(135deg, #27ae60, #2ecc71);
                color: #fff;
                box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
            }
            .action-link.approve:hover {
                box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
            }
            .action-link.reject {
                background: linear-gradient(135deg, #c0392b, #e74c3c);
                color: #fff;
                box-shadow: 0 4px 12px rgba(192, 57, 43, 0.2);
            }
            .action-link.reject:hover {
                box-shadow: 0 6px 20px rgba(192, 57, 43, 0.3);
            }
            .empty-state {
                padding: 50px;
                text-align: center;
                color: #b8a99a;
                font-size: 15px;
            }
            .empty-icon {
                font-size: 48px;
                margin-bottom: 12px;
                opacity: 0.4;
            }
        </style>

        <div class="page-header">
            <div>
                <h2 class="page-title">骑手审核</h2>
                <p style="color: #8a6d5b; font-size: 14px; margin-top: 4px;">共 <span style="color: #C9A96E; font-weight: 700;">[[${totalItems}]]</span> 条待审核记录</p>
            </div>
        </div>

        <!-- 搜索框 -->
        <form action="/admin/riderList" method="get" class="search-box" style="margin-bottom: 20px;">
            <input type="text" name="keyword" placeholder="搜索骑手姓名、手机号..." th:value="${keyword != null ? keyword : ''}">
            <button type="submit" class="btn btn-primary">搜索</button>
            <a th:href="@{/admin/riderList}" class="btn btn-secondary">重置</a>
        </form>

        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 60px;">ID</th>
                    <th>骑手姓名</th>
                    <th>手机号</th>
                    <th style="width: 100px;">状态</th>
                    <th>注册时间</th>
                    <th style="text-align:center; width: 180px;">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="rider : ${riderList}">
                    <td style="color: #8a6d5b;">[[${rider.id}]]</td>
                    <td style="font-weight:500; color:#2d1810;">[[${rider.name}]]</td>
                    <td style="color:#666;">[[${rider.phone}]]</td>
                    <td>
                        <span class="user-role pending">待审核</span>
                    </td>
                    <td style="color:#888; font-size:13px;">[[${rider.createTime} != null ? rider.createTime : 'N/A']]</td>
                    <td style="text-align:center;">
                        <div class="action-group" style="display:flex; gap:6px; justify-content:center;">
                            <a th:href="'/admin/approveRider?id=' + ${rider.id}" 
                               class="action-link approve"
                               onclick="return confirm('确定要通过该骑手的审核吗？')">通过</a>
                            <a th:href="'/admin/rejectRider?id=' + ${rider.id}" 
                               class="action-link reject"
                               onclick="return confirm('确定要拒绝该骑手吗？此操作将删除骑手信息！')">拒绝</a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${riderList == null || riderList.isEmpty()}">
                    <td colspan="6" class="empty-state">
                        <div class="empty-icon">👥</div>
                        <div>暂无待审核的骑手</div>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- 分页 -->
        <div class="pagination-container" style="margin-top: 28px; display: flex; justify-content: center; align-items: center; gap: 8px;">
            <span style="color: #8a6d5b; margin-right: 10px;">共 <strong>[[${totalItems}]]</strong> 条</span>

            <a th:if="${currentPage > 1}" 
               th:href="@{/admin/riderList(page=${currentPage - 1}, keyword=${keyword != null ? keyword : ''})}" 
               style="padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; color: #333; background: #fff;">上一页</a>

            <a th:each="i : ${#numbers.sequence(1, totalPages)}"
               th:href="@{/admin/riderList(page=${i}, keyword=${keyword != null ? keyword : ''})}"
               th:style="${i == currentPage ? 'padding: 8px 16px; border-radius: 4px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none;' : 'padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; color: #333; background: #fff;'"
               th:text="${i}">1</a>

            <a th:if="${currentPage < totalPages}" 
               th:href="@{/admin/riderList(page=${currentPage + 1}, keyword=${keyword != null ? keyword : ''})}" 
               style="padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; color: #333; background: #fff;">下一页</a>

            <span style="color: #8a6d5b; margin-left: 10px;">共 <strong>[[${totalPages}]]</strong> 页</span>
        </div>

    </div>
</body>
</html>
