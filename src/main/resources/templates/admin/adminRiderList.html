<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
</head>
<body>
    <div th:fragment="content">
        <style>
            .rider-container {
                padding: 20px;
            }

            .rider-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }

            .rider-header h3 {
                font-size: 20px;
                color: #2d1810;
                margin: 0;
                font-weight: 600;
            }

            .rider-table {
                width: 100%;
                border-collapse: collapse;
                background: #fff;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            }

            .rider-table th,
            .rider-table td {
                padding: 14px 16px;
                text-align: left;
                border-bottom: 1px solid rgba(201, 169, 110, 0.1);
            }

            .rider-table th {
                background: rgba(245, 230, 211, 0.4);
                color: #5a3a28;
                font-weight: 600;
                font-size: 13px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .rider-table tr:hover {
                background: rgba(245, 230, 211, 0.2);
            }

            .rider-table tr:last-child td {
                border-bottom: none;
            }

            .status-badge {
                display: inline-block;
                padding: 4px 12px;
                border-radius: 12px;
                font-size: 12px;
                font-weight: 500;
            }

            .status-pending {
                background: rgba(230, 180, 80, 0.15);
                color: #b8860b;
            }

            .status-active {
                background: rgba(166, 139, 92, 0.15);
                color: #6d8c4a;
            }

            .action-group {
                display: flex;
                gap: 8px;
            }

            .action-link {
                padding: 6px 14px;
                border-radius: 8px;
                text-decoration: none;
                font-size: 12px;
                font-weight: 500;
                transition: all 0.3s;
            }

            .action-link.approve {
                background: rgba(76, 175, 80, 0.1);
                color: #388e3c;
                border: 1px solid rgba(76, 175, 80, 0.2);
            }

            .action-link.approve:hover {
                background: #388e3c;
                color: #fff;
            }

            .action-link.reject {
                background: rgba(244, 67, 54, 0.1);
                color: #c62828;
                border: 1px solid rgba(244, 67, 54, 0.2);
            }

            .action-link.reject:hover {
                background: #c62828;
                color: #fff;
            }

            .empty-state {
                text-align: center;
                padding: 60px 40px;
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            }

            .empty-state .empty-icon {
                font-size: 60px;
                color: rgba(201, 169, 110, 0.3);
                margin-bottom: 16px;
            }

            .empty-state p {
                color: #8a6d5b;
                font-size: 14px;
            }

            .pagination-container {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 15px;
                padding: 20px;
                background: #fff;
                border-radius: 12px;
                margin-top: 20px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            }

            .pagination-container a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                text-decoration: none;
                color: #8a6d5b;
                font-size: 18px;
                font-weight: 600;
                transition: all 0.3s;
                border-radius: 50%;
                background: rgba(245, 230, 211, 0.3);
            }

            .pagination-container a:hover {
                background: #C9A96E;
                color: #fff;
            }

            .pagination-container .disabled-pagination {
                opacity: 0.35;
                pointer-events: none;
            }

            .pagination-container .current-page {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 36px;
                height: 36px;
                font-size: 14px;
                font-weight: 700;
                color: #fff;
                background: #C9A96E;
                border-radius: 50%;
                padding: 0 4px;
            }

            .pagination-container .page-info {
                color: #8a6d5b;
                font-size: 13px;
            }
        </style>

        <div class="rider-container">
            <div class="rider-header">
                <h3>待审核骑手列表</h3>
                <span style="color: #8a6d5b; font-size: 13px;">共 <strong style="color: #C9A96E;">[[${totalItems}]]</strong> 条记录</span>
            </div>

            <div th:if="${riderList != null && !riderList.isEmpty()}">
                <table class="rider-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>骑手姓名</th>
                            <th>手机号</th>
                            <th>状态</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rider : ${riderList}">
                            <td style="color: #8a6d5b; font-size: 13px;">[[${rider.id}]]</td>
                            <td style="font-weight: 500; color: #2d1810;">[[${rider.name}]]</td>
                            <td style="color: #5a3a28;">[[${rider.phone}]]</td>
                            <td>
                                <span class="status-badge status-pending">待审核</span>
                            </td>
                            <td style="color: #8a6d5b; font-size: 13px;">[[${rider.createTime} != null ? rider.createTime : 'N/A']]</td>
                            <td>
                                <div style="display: flex; gap: 8px;">
                                    <a th:href="'/admin/approveRider?id=' + ${rider.id}" 
                                       style="padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 500; background: rgba(76, 175, 80, 0.1); color: #388e3c; border: 1px solid rgba(76, 175, 80, 0.2); transition: all 0.3s;"
                                       onclick="return confirm('确定要通过该骑手的审核吗？')">通过</a>
                                    <a th:href="'/admin/rejectRider?id=' + ${rider.id}" 
                                       style="padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 500; background: rgba(244, 67, 54, 0.1); color: #c62828; border: 1px solid rgba(244, 67, 54, 0.2); transition: all 0.3s;"
                                       onclick="return confirm('确定要拒绝该骑手吗？此操作将删除骑手信息！')">拒绝</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div th:if="${totalPages > 1}" class="pagination-container">
                    <span class="page-info">第 [[${currentPage}]] / [[${totalPages}]] 页</span>
                    <a th:href="@{/admin/riderList(page=${currentPage - 1})}" 
                       th:classappend="${currentPage == 1 ? 'disabled-pagination' : ''}">
                        <</a>
                    <span class="current-page">[[${currentPage}]]</span>
                    <a th:href="@{/admin/riderList(page=${currentPage + 1})}" 
                       th:classappend="${currentPage == totalPages ? 'disabled-pagination' : ''}">
                        ></a>
                </div>
            </div>

            <div th:if="${riderList == null || riderList.isEmpty()}" class="empty-state">
                <i class="icon icon-user-circle empty-icon"></i>
                <p>暂无待审核的骑手</p>
            </div>
        </div>
    </div>
</body>
</html>
