<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码</title>
    <link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .msg { text-align: center; padding: 10px; margin-bottom: 20px; border-radius: 8px; }
        .msg.success { background: #d4edda; color: #155724; }
        .msg.error { background: #f8d7da; color: #721c24; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #667eea; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>修改密码</h2>
        
        <div th:if="${msg != null}" th:class="|msg ${msg.contains('成功') ? 'success' : 'error'}|">
            <span th:text="${msg}"></span>
        </div>

        <form action="/user/changePassword" method="post">
            <div class="form-group">
                <label>原密码</label>
                <input type="password" name="oldPassword" placeholder="请输入原密码" required>
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="newPassword" placeholder="请输入新密码（8-20位，包含字母和数字）" required>
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" name="confirmPassword" placeholder="请再次输入新密码" required>
            </div>
            <button type="submit" class="btn">确认修改</button>
        </form>
        
        <a href="javascript:history.back()" class="back-link"> 返回</a>
    </div>
</body>
</html>
