<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>蛋糕系统 - 法式甜品杂志</title>
<link rel="icon" type="image/jpeg" href="/picture/logo.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<link type="text/css" rel="stylesheet" th:href="@{/css/main.css}">
<link type="text/css" rel="stylesheet" th:href="@{/css/zui.min.css}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&display=swap" rel="stylesheet">
<script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
<script type="text/javascript" th:src="@{/js/zui.min.js}"></script>

<style type="text/css">
    /* ===== CSS 变量 ===== */
    :root {
        --gold: #C9A96E;
        --gold-light: #E3C98B;
        --gold-dark: #A68B5C;
        --cream: #F5E6D3;
        --cream-light: #faf3ec;
        --dark: #1a1410;
        --dark-brown: #2d1810;
        --mid-brown: #4a2a1a;
        --text-muted: #8B7355;
        --card-bg: rgba(255, 255, 255, 0.88);
        --shadow-sm: 0 4px 20px rgba(45, 24, 16, 0.08);
        --shadow-md: 0 8px 30px rgba(45, 24, 16, 0.12);
        --shadow-lg: 0 20px 60px rgba(45, 24, 16, 0.15);
        --radius-sm: 12px;
        --radius-md: 18px;
        --radius-lg: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Noto Sans SC', 'DM Sans', sans-serif;
        background: var(--cream-light);
        min-height: 100vh;
    }

    /* ===== 杂志封面 Hero ===== */
    .hero-magazine {
        position: relative;
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #1a1410 0%, #2d1810 35%, #4a2a1a 65%, #2d1810 100%);
        overflow: hidden;
        margin-bottom: 60px;
    }

    /* 装饰光效 */
    .hero-magazine::before {
        content: '';
        position: absolute;
        top: -30%;
        right: -10%;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(201, 169, 110, 0.12) 0%, transparent 70%);
        animation: heroGlow 10s ease-in-out infinite alternate;
    }

    .hero-magazine::after {
        content: '';
        position: absolute;
        bottom: -20%;
        left: -5%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(201, 169, 110, 0.06) 0%, transparent 60%);
        animation: heroGlow 12s ease-in-out infinite alternate-reverse;
    }

    @keyframes heroGlow {
        0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
        100% { transform: translate(40px, -30px) scale(1.15); opacity: 1; }
    }

    /* 几何装饰线条 */
    .hero-line {
        position: absolute;
        background: linear-gradient(90deg, transparent, rgba(201, 169, 110, 0.15), transparent);
        height: 1px;
        width: 60%;
    }
    .hero-line:nth-child(1) { top: 15%; left: 20%; transform: rotate(-2deg); }
    .hero-line:nth-child(2) { bottom: 20%; right: 15%; transform: rotate(3deg); width: 40%; }

    .hero-content {
        position: relative;
        z-index: 2;
        text-align: center;
        max-width: 900px;
        padding: 40px 30px;
        animation: heroFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes heroFadeIn {
        0% { opacity: 0; transform: translateY(40px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    .hero-supertitle {
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: rgba(201, 169, 110, 0.6);
        margin-bottom: 20px;
        position: relative;
        display: inline-block;
    }

    .hero-supertitle::before,
    .hero-supertitle::after {
        content: '';
        display: inline-block;
        width: 40px;
        height: 1px;
        background: rgba(201, 169, 110, 0.3);
        vertical-align: middle;
        margin: 0 16px;
    }

    .hero-title {
        font-family: 'Playfair Display', serif;
        font-size: clamp(48px, 8vw, 96px);
        font-weight: 700;
        color: var(--cream);
        line-height: 1.08;
        margin-bottom: 16px;
        text-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    .hero-title .accent {
        font-style: italic;
        color: var(--gold);
        position: relative;
    }

    .hero-title .accent::after {
        content: '';
        position: absolute;
        bottom: 4px;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, var(--gold), transparent);
    }

    .hero-subtitle {
        font-size: 18px;
        color: rgba(245, 230, 211, 0.6);
        font-weight: 300;
        line-height: 1.8;
        max-width: 600px;
        margin: 0 auto 36px;
        letter-spacing: 1px;
    }

    .hero-actions {
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
    }

    .hero-btn {
        padding: 16px 44px;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: none;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: 'Noto Sans SC', sans-serif;
        letter-spacing: 1px;
    }

    .hero-btn-primary {
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
        color: #fff;
        box-shadow: 0 8px 30px rgba(201, 169, 110, 0.35);
    }
    .hero-btn-primary:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 12px 40px rgba(201, 169, 110, 0.45);
        color: #fff;
        text-decoration: none;
    }

    .hero-btn-secondary {
        background: rgba(201, 169, 110, 0.15);
        color: var(--cream);
        border: 2px solid rgba(201, 169, 110, 0.4);
        backdrop-filter: blur(10px);
    }
    .hero-btn-secondary:hover {
        background: rgba(201, 169, 110, 0.25);
        border-color: rgba(201, 169, 110, 0.6);
        transform: translateY(-4px);
        color: var(--cream);
        text-decoration: none;
        box-shadow: 0 8px 25px rgba(201, 169, 110, 0.3);
    }

    /* 滚动指示器 */
    .scroll-indicator {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: rgba(245, 230, 211, 0.3);
        font-size: 12px;
        letter-spacing: 2px;
        animation: bounceDown 2s ease-in-out infinite;
    }
    .scroll-indicator .line {
        width: 1px;
        height: 30px;
        background: linear-gradient(to bottom, rgba(201, 169, 110, 0.4), transparent);
    }
    @keyframes bounceDown {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ===== 主要内容区域 ===== */
    .main-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 30px;
    }

    /* ===== 特色专区 - 编辑精选 ===== */
    .featured-section {
        margin-bottom: 80px;
        display: flex;
        flex-direction: column;
        gap: 32px;
    }

    .featured-label {
        text-align: center;
        margin-bottom: 40px;
    }
    .featured-label span {
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-muted);
        position: relative;
        display: inline-block;
        padding: 0 20px;
    }
    .featured-label span::before,
    .featured-label span::after {
        content: '—';
        color: var(--gold);
        margin: 0 10px;
    }

    .featured-card {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        border: 1px solid rgba(201, 169, 110, 0.12);
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 0;
        transition: all 0.5s ease;
    }
    .featured-card:hover {
        box-shadow: var(--shadow-lg);
        transform: translateY(-6px);
        border-color: rgba(201, 169, 110, 0.25);
    }

    .featured-info {
        flex: 1;
        padding: 60px 50px;
    }
    .featured-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
        color: #fff;
        padding: 6px 20px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(201, 169, 110, 0.3);
    }
    .featured-name {
        font-family: 'Playfair Display', serif;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 700;
        color: var(--dark-brown);
        margin-bottom: 16px;
        line-height: 1.2;
    }
    .featured-desc {
        font-size: 16px;
        color: var(--text-muted);
        line-height: 1.9;
        margin-bottom: 28px;
        max-width: 450px;
    }
    .featured-actions {
        display: flex;
        gap: 14px;
    }
    .featured-image {
        flex-shrink: 0;
        width: 480px;
        height: 420px;
        overflow: hidden;
        position: relative;
    }
    .featured-image::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to left, transparent 60%, rgba(26, 20, 16, 0.15));
    }
    .featured-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .featured-card:hover .featured-image img {
        transform: scale(1.08);
    }

    /* ===== 商品网格区域 ===== */
    .products-section {
        margin-bottom: 80px;
    }

    .section-header {
        text-align: center;
        margin-bottom: 50px;
        position: relative;
    }
    .section-header::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201, 169, 110, 0.2), transparent);
    }
    .section-title {
        font-family: 'Playfair Display', serif;
        font-size: 38px;
        font-weight: 700;
        color: var(--dark-brown);
        position: relative;
        display: inline-block;
        background: var(--cream-light);
        padding: 0 30px;
        z-index: 1;
    }
    .section-title::after {
        content: '';
        display: block;
        width: 50px;
        height: 2px;
        background: linear-gradient(90deg, var(--gold), var(--gold-dark));
        margin: 12px auto 0;
        border-radius: 2px;
    }
    .section-subtitle {
        font-size: 15px;
        color: var(--text-muted);
        margin-top: 14px;
        position: relative;
        z-index: 1;
        background: var(--cream-light);
        display: inline-block;
        padding: 0 20px;
    }

    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
        padding-bottom: 20px;
    }

    .product-card {
        background: var(--card-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid rgba(201, 169, 110, 0.08);
        position: relative;
    }
    .product-card:hover {
        transform: translateY(-12px) scale(1.01);
        box-shadow: var(--shadow-lg);
        border-color: rgba(201, 169, 110, 0.2);
    }

    .product-image {
        width: 100%;
        height: 280px;
        overflow: hidden;
        position: relative;
    }
    .product-image::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60px;
        background: linear-gradient(to top, rgba(255,255,255,0.7), transparent);
    }
    .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .product-card:hover .product-image img {
        transform: scale(1.12);
    }

    /* 价格角标 */
    .product-price-tag {
        position: absolute;
        top: 16px;
        right: 16px;
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
        color: #fff;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 18px;
        font-weight: 700;
        font-family: 'Playfair Display', serif;
        box-shadow: 0 4px 15px rgba(201, 169, 110, 0.35);
        z-index: 2;
    }

    .product-info {
        padding: 22px 24px 24px;
    }
    .product-category {
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--gold-dark);
        margin-bottom: 8px;
    }
    .product-name {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--dark-brown);
        margin-bottom: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .product-intro {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 18px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .product-actions {
        display: flex;
        gap: 10px;
    }
    .btn-product {
        flex: 1;
        padding: 11px 16px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.35s ease;
        border: none;
        font-family: 'Noto Sans SC', sans-serif;
        text-align: center;
        text-decoration: none;
    }
    .btn-product-cart {
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
        color: #fff;
        box-shadow: 0 4px 15px rgba(201, 169, 110, 0.25);
    }
    .btn-product-cart:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(201, 169, 110, 0.35);
        color: #fff;
        text-decoration: none;
    }
    .btn-product-detail {
        background: #fff;
        color: var(--mid-brown);
        border: 2px solid var(--mid-brown);
        font-weight: 700;
    }
    .btn-product-detail:hover {
        background: var(--mid-brown);
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(74, 42, 26, 0.2);
        text-decoration: none;
    }

    /* ===== 装饰分隔条 ===== */
    .divider-section {
        text-align: center;
        padding: 20px 0;
        margin-bottom: 40px;
        position: relative;
    }
    .divider-section .diamond {
        display: inline-block;
        width: 10px;
        height: 10px;
        background: var(--gold);
        transform: rotate(45deg);
        margin: 0 12px;
        opacity: 0.5;
    }
    .divider-section .line {
        display: inline-block;
        width: 80px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        vertical-align: middle;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 1024px) {
        .featured-card { flex-direction: column; }
        .featured-image {
            width: 100%;
            height: 350px;
        }
        .featured-image::after {
            background: linear-gradient(to top, transparent 60%, rgba(26, 20, 16, 0.1));
        }
        .featured-info { padding: 40px 32px; }
    }

    @media (max-width: 768px) {
        .hero-magazine { min-height: 70vh; }
        .hero-subtitle { font-size: 16px; }
        .hero-actions { flex-direction: column; align-items: center; }
        .hero-btn { width: 100%; max-width: 320px; justify-content: center; }
        .main-content { padding: 0 16px; }
        .products-grid { grid-template-columns: 1fr; }
        .featured-info { padding: 30px 24px; }
        .featured-image { height: 280px; }
        .featured-actions { flex-direction: column; }
        .section-title { font-size: 28px; padding: 0 16px; }
        .product-image { height: 240px; }
    }

    @media (max-width: 480px) {
        .hero-title { font-size: 36px; }
        .hero-supertitle { font-size: 11px; letter-spacing: 3px; }
        .hero-supertitle::before,
        .hero-supertitle::after { width: 20px; }
    }
</style>

<script type="text/javascript">
function queryGood(){
    var name = $("#name").val();
    location.href = "[[@{/goods/goodsList}]]?name=" + name;
}

function seeDetail(id){
    location.href = "[[@{/goods/goodsList}]]?id=" + id;
}

function buy(id){
    if (![[${session.user != null}]]) {
        alert('请先登录后再加入购物车');
        location.href = '/login.html';
        return;
    }
    location.href = "[[@{/cart/addToCart}]]?id=" + id + "&flag=1";
}

// AI客服对话框控制
function toggleChatDialog() {
    var dialog = document.getElementById('aiChatDialog');
    var overlay = document.getElementById('chatOverlay');
    
    if (dialog.classList.contains('show')) {
        closeChatDialog();
    } else {
        dialog.classList.add('show');
        overlay.classList.add('show');
        document.getElementById('chatInput').focus();
        scrollToBottom();
    }
}

function closeChatDialog() {
    document.getElementById('aiChatDialog').classList.remove('show');
    document.getElementById('chatOverlay').classList.remove('show');
}

function scrollToBottom() {
    var chatMessages = document.getElementById('chatMessages');
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function handleChatKeydown(event) {
    if (event.keyCode === 13 && !event.shiftKey) {
        event.preventDefault();
        sendChatMessage();
    }
}

function sendChatMessage() {
    var input = document.getElementById('chatInput');
    var message = input.value.trim();
    
    if (!message) return;
    
    addMessage('user', message);
    input.value = '';
    
    simulateAIChat(message);
}

function addMessage(sender, content) {
    var chatMessages = document.getElementById('chatMessages');
    var messageClass = sender === 'user' ? 'user-message' : 'ai-message';
    var avatar = sender === 'user' ? '👤' : '🤖';
    
    var messageElement = document.createElement('div');
    messageElement.className = 'message ' + messageClass;
    messageElement.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div class="message-content">
            <p>${content}</p>
        </div>
    `;
    
    chatMessages.appendChild(messageElement);
    scrollToBottom();
}

function simulateAIChat(userMessage) {
    var responses = [
        '好的，我来帮您解答！',
        '很高兴为您服务~',
        '感谢您的咨询，祝您购物愉快！',
        '这个问题我来帮您处理。',
        '了解，我会尽快回复您。',
        '蛋糕都是当天新鲜制作的哦~',
        '我们支持多种支付方式：微信、支付宝、银行卡都可以~',
        '配送范围一般在3公里内，配送时间约30-45分钟~',
        '生日蛋糕需要提前1-2天预定哦~',
        '如果有任何问题，请随时联系我们！'
    ];
    
    var keywords = {
        '价格': '我们的蛋糕价格从99元到599元不等，根据款式和尺寸有所不同~',
        '配送': '配送范围一般在3公里内，配送时间约30-45分钟~',
        '预定': '生日蛋糕需要提前1-2天预定，您可以在首页选择心仪的款式~',
        '口味': '我们有多种口味：巧克力、抹茶、草莓、芝士、芒果等~',
        '优惠': '关注公众号可领取新人优惠券，还有会员积分活动哦~',
        '营业时间': '我们的营业时间是上午9点到晚上9点~',
        '地址': '我们的门店位于市中心商业街88号~',
        '联系': '24小时客服热线：010-68988888~',
        '订单': '您可以在"我的订单"页面查看订单状态~',
        '退款': '未配送的订单可以申请退款，一般1-3个工作日到账~'
    };
    
    var response = responses[Math.floor(Math.random() * responses.length)];
    
    for (var keyword in keywords) {
        if (userMessage.indexOf(keyword) !== -1) {
            response = keywords[keyword];
            break;
        }
    }
    
    setTimeout(function() {
        addMessage('ai', response);
    }, 800 + Math.random() * 1000);
}
</script>

</head>
<body>

<script th:inline="javascript">
    $(function() {
        var msg = [[${msg}]];
        if (msg) {
            new $.zui.Messager(msg, {
                icon: 'bell-alt',
                type: 'warning',
                placement: 'center'
            }).show();
        }
        
        // AI客服对话框控制
        window.toggleChatDialog = function() {
            var dialog = document.getElementById('aiChatDialog');
            var overlay = document.getElementById('chatOverlay');
            
            if (dialog && overlay) {
                if (dialog.classList.contains('show')) {
                    window.closeChatDialog();
                } else {
                    dialog.classList.add('show');
                    overlay.classList.add('show');
                    var input = document.getElementById('chatInput');
                    if (input) input.focus();
                    window.scrollToBottom();
                }
            }
        }

        window.closeChatDialog = function() {
            var dialog = document.getElementById('aiChatDialog');
            var overlay = document.getElementById('chatOverlay');
            if (dialog) dialog.classList.remove('show');
            if (overlay) overlay.classList.remove('show');
        }

        window.scrollToBottom = function() {
            var chatMessages = document.getElementById('chatMessages');
            if (chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        window.handleChatKeydown = function(event) {
            if (event.keyCode === 13 && !event.shiftKey) {
                event.preventDefault();
                window.sendChatMessage();
            }
        }

        window.sendChatMessage = function() {
            var input = document.getElementById('chatInput');
            if (!input) return;
            
            var message = input.value.trim();
            if (!message) return;
            
            window.addMessage('user', message);
            input.value = '';
            window.simulateAIChat(message);
        }

        window.addMessage = function(sender, content) {
            var chatMessages = document.getElementById('chatMessages');
            if (!chatMessages) return;
            
            var messageClass = sender === 'user' ? 'user-message' : 'ai-message';
            var avatar = sender === 'user' ? '👤' : '🤖';
            
            var messageElement = document.createElement('div');
            messageElement.className = 'message ' + messageClass;
            messageElement.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <p>${content}</p>
                </div>
            `;
            
            chatMessages.appendChild(messageElement);
            window.scrollToBottom();
        }

        window.simulateAIChat = function(userMessage) {
            var responses = [
                '好的，我来帮您解答！',
                '很高兴为您服务~',
                '感谢您的咨询，祝您购物愉快！',
                '这个问题我来帮您处理。',
                '了解，我会尽快回复您。',
                '蛋糕都是当天新鲜制作的哦~',
                '我们支持多种支付方式：微信、支付宝、银行卡都可以~',
                '配送范围一般在3公里内，配送时间约30-45分钟~',
                '生日蛋糕需要提前1-2天预定哦~',
                '如果有任何问题，请随时联系我们！'
            ];
            
            var keywords = {
                '价格': '我们的蛋糕价格从99元到599元不等，根据款式和尺寸有所不同~',
                '配送': '配送范围一般在3公里内，配送时间约30-45分钟~',
                '预定': '生日蛋糕需要提前1-2天预定，您可以在首页选择心仪的款式~',
                '口味': '我们有多种口味：巧克力、抹茶、草莓、芝士、芒果等~',
                '优惠': '关注公众号可领取新人优惠券，还有会员积分活动哦~',
                '营业时间': '我们的营业时间是上午9点到晚上9点~',
                '地址': '我们的门店位于市中心商业街88号~',
                '联系': '24小时客服热线：010-68988888~',
                '订单': '您可以在"我的订单"页面查看订单状态~',
                '退款': '未配送的订单可以申请退款，一般1-3个工作日到账~'
            };
            
            var response = responses[Math.floor(Math.random() * responses.length)];
            
            for (var keyword in keywords) {
                if (userMessage.indexOf(keyword) !== -1) {
                    response = keywords[keyword];
                    break;
                }
            }
            
            setTimeout(function() {
                window.addMessage('ai', response);
            }, 800 + Math.random() * 1000);
        }
    });
</script>
