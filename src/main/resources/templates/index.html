<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>蛋糕系统 - 首页</title>
<link rel="icon" type="image/jpeg" href="/picture/logo.jpg">

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<link type="text/css" rel="stylesheet" th:href="@{/css/main.css}">
<link type="text/css" rel="stylesheet" th:href="@{/css/zui.min.css}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="text/javascript" th:src="@{/js/jquery-3.0.0.js}"></script>
<script type="text/javascript" th:src="@{/js/zui.min.js}"></script>

<style type="text/css">
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif;
        background: linear-gradient(135deg, #f8f4f0 0%, #f0ebe5 100%);
        min-height: 100vh;
    }

    .main-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    /* 精选推荐区域 */
    .featured-section {
        position: relative;
        margin-bottom: 50px;
    }

    .featured-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(45, 24, 16, 0.1);
        border: 1px solid rgba(201, 169, 110, 0.15);
        overflow: hidden;
        display: flex;
        align-items: center;
        padding: 40px;
        margin-bottom: 30px;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }

    .featured-card:hover {
        transform: translateY(-8px) scale(1.01);
        box-shadow: 0 20px 60px rgba(45, 24, 16, 0.15);
        border-color: rgba(201, 169, 110, 0.3);
    }

    .featured-info {
        flex: 1;
        padding-right: 40px;
        text-align: center;
    }

    .featured-badge {
        display: inline-block;
        background: linear-gradient(135deg, #C9A96E 0%, #A68B5C 100%);
        color: #fff;
        padding: 8px 24px;
        border-radius: 20px;
        font-size: 13px;
        margin-bottom: 20px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        box-shadow: 0 4px 15px rgba(201, 169, 110, 0.3);
    }

    .featured-name {
        font-family: 'Playfair Display', serif;
        font-size: 48px;
        font-weight: 700;
        color: #2d1810;
        margin-bottom: 20px;
        line-height: 1.2;
    }

    .featured-desc {
        font-size: 16px;
        color: #8B7355;
        line-height: 1.8;
        margin-bottom: 30px;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
    }

    .featured-actions {
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .btn-action {
        padding: 14px 36px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        border: none;
        text-decoration: none;
        display: inline-block;
        font-family: 'Noto Sans SC', sans-serif;
    }

    .btn-add-cart {
        background: linear-gradient(135deg, #C9A96E 0%, #A68B5C 100%);
        color: #fff;
        box-shadow: 0 4px 15px rgba(201, 169, 110, 0.4);
    }

    .btn-add-cart:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(201, 169, 110, 0.5);
    }

    .btn-detail {
        background: transparent;
        color: #4a2a1a;
        border: 2px solid #4a2a1a;
    }

    .btn-detail:hover {
        background: #4a2a1a;
        color: #F5E6D3;
        transform: translateY(-2px);
    }

    .featured-image {
        flex-shrink: 0;
        width: 500px;
        height: 400px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(45, 24, 16, 0.15);
    }

    .featured-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .featured-card:hover .featured-image img {
        transform: scale(1.05);
    }

    /* 商品网格区域 */
    .products-section {
        margin-top: 60px;
    }

    .section-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .section-title {
        font-family: 'Playfair Display', serif;
        font-size: 36px;
        font-weight: 700;
        color: #2d1810;
        margin-bottom: 10px;
        position: relative;
        display: inline-block;
    }

    .section-title::after {
        content: '';
        display: block;
        width: 60px;
        height: 3px;
        background: linear-gradient(135deg, #C9A96E, #A68B5C);
        margin: 12px auto 0;
        border-radius: 2px;
    }

    .section-subtitle {
        font-size: 16px;
        color: #8B7355;
    }

    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
    }

    .product-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(45, 24, 16, 0.08);
        transition: all 0.4s ease;
        border: 1px solid rgba(201, 169, 110, 0.1);
    }

    .product-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 16px 40px rgba(45, 24, 16, 0.15);
        border-color: rgba(201, 169, 110, 0.25);
    }

    .product-image {
        width: 100%;
        height: 250px;
        overflow: hidden;
    }

    .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .product-card:hover .product-image img {
        transform: scale(1.1);
    }

    .product-info {
        padding: 22px;
    }

    .product-name {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 700;
        color: #2d1810;
        margin-bottom: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .product-category {
        font-size: 14px;
        color: #A68B5C;
        margin-bottom: 12px;
    }

    .product-price {
        font-size: 26px;
        font-weight: 700;
        color: #4a2a1a;
        margin-bottom: 16px;
    }

    .product-actions {
        display: flex;
        gap: 10px;
    }

    .btn-product {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        border: none;
        font-family: 'Noto Sans SC', sans-serif;
    }

    .btn-product-cart {
        background: linear-gradient(135deg, #C9A96E 0%, #A68B5C 100%);
        color: #fff;
        box-shadow: 0 4px 12px rgba(201, 169, 110, 0.3);
    }

    .btn-product-cart:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(201, 169, 110, 0.4);
    }

    .btn-product-detail {
        background: rgba(74, 42, 26, 0.08);
        color: #4a2a1a;
    }

    .btn-product-detail:hover {
        background: #4a2a1a;
        color: #F5E6D3;
    }

    /* 响应式 */
    @media (max-width: 992px) {
        .featured-card {
            flex-direction: column;
            text-align: center;
        }

        .featured-info {
            padding-right: 0;
            padding-bottom: 30px;
        }

        .featured-name {
            font-size: 36px;
        }

        .featured-image {
            width: 100%;
            max-width: 400px;
            height: 300px;
        }

        .featured-actions {
            flex-direction: column;
            align-items: center;
        }

        .btn-action {
            width: 100%;
            max-width: 280px;
            text-align: center;
        }
    }

    @media (max-width: 768px) {
        .products-grid {
            grid-template-columns: 1fr;
        }

        .featured-name {
            font-size: 28px;
        }
    }
</style>

<script type="text/javascript">
function queryGood(){
    var name = $("#name").val();
    location.href="[[@{/goods/goodsList}]]?name="+name;
}

function seeDetail(id){
    location.href="[[@{/goods/goodsList}]]?id="+id;
}

function buy(id){
    location.href="[[@{/cart/addToCart}]]?id="+id+"&flag=1";
}
</script>

</head>
<body>

<script th:inline="javascript">
    $(function() {
        var msg = [[${msg}]];
        if (msg) {
            new $.zui.Messager(msg, {
                icon: 'bell-alt',
                type: 'warning',
                placement: 'center'
            }).show();
        }
    });
    </script>

<div th:replace="admin/commons::topbar"></div>

<div class="main-content">
    <div class="featured-section">
        <div th:each="goods : ${goodsList}" class="featured-card">
            <div class="featured-info">
                <span class="featured-badge">今日精选推荐</span>
                <h1 class="featured-name" th:text="${goods.name}"></h1>
                <p class="featured-desc" th:text="${goods.intro}"></p>
                <div class="featured-actions">
                    <button class="btn-action btn-add-cart" th:onclick="'buy(' + ${goods.id} + ')'">加入购物车</button>
                    <button class="btn-action btn-detail" th:onclick="'seeDetail(' + ${goods.id} + ')'">查看详情</button>
                </div>
            </div>
            <div class="featured-image">
                <img th:src="${goods.cover}" alt="商品图片">
            </div>
        </div>
    </div>

    <div class="products-section">
        <div class="section-header">
            <h2 class="section-title">热门商品</h2>
            <p class="section-subtitle">精选优质商品，为您的生活添彩</p>
        </div>
        <div class="products-grid">
            <div th:each="goods : ${goodsList}" class="product-card">
                <div class="product-image">
                    <img th:src="${goods.cover}" alt="商品图片">
                </div>
                <div class="product-info">
                    <h3 class="product-name" th:text="${goods.name}"></h3>
                    <p class="product-category" th:text="${goods.typename}"></p>
                    <p class="product-price">¥<span th:text="${goods.price}"></span></p>
                    <div class="product-actions">
                        <button class="btn-product btn-product-cart" th:onclick="'buy(' + ${goods.id} + ')'">加入购物车</button>
                        <button class="btn-product btn-product-detail" th:onclick="'seeDetail(' + ${goods.id} + ')'">详情</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="admin/commons::footbar"></div>

</body>
</html>
