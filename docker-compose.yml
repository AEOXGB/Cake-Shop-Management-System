services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: cakeshop-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: cookieshop
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - cakeshop-network

  # CakeShop 应用服务
  cakeshop:
    build: .
    container_name: cakeshop-app
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cookieshop?characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
    ports:
      - "8090:8090"
    depends_on:
      - mysql
    networks:
      - cakeshop-network

volumes:
  mysql_data:

networks:
  cakeshop-network:
    driver: bridge